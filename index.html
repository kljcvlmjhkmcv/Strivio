.MCL{position:absolute;top:1rem;right:1rem;width:32px;height:32px;border-radius:50%;background:#2A2A2A;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#E0E0E0;transition:all .2s;z-index:10}

.MCO{display:block;width:100%;background:var(--n);color:#121212;font-weight:700;font-family:'Space Grotesk',sans-serif;border-radius:12px;padding:.9rem;border:none;cursor:pointer;font-size:1rem;margin-top:1rem;transition:all .2s;animation:P2 3s ease-in-out infinite}

#LDPD,#LDPM{box-shadow:0 8px 30px rgba(0,0,0,.5)}
#LDPD.O,#LDPM.O{display:block}
[dir=rtl] .DO,[dir=rtl] .TP2,[dir=rtl] .BC{flex-direction:row-reverse}
[dir=rtl] .LO{text-align:right;flex-direction:row-reverse}
[dir=rtl] #MB .MCL{right:auto;left:1rem}
@media(max-width:640px){
  #MO{align-items:flex-end;padding:0}

<script>
(function(){
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
  document.addEventListener('keydown', function(e){
    if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) || (e.ctrlKey && (e.key === 'U' || e.key === 'u' || e.key === 'S' || e.key === 's'))) {
      e.preventDefault();
    }
  });
  setInterval(function(){
    var before = new Date().getTime();
    debugger;
    var after = new Date().getTime();
    if (after - before > 100) {
      document.body.innerHTML = '<div style="background:#121212;color:#ff3333;height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;font-weight:bold;font-size:24px">Protected Code — Access Denied</div>';
    }
  }, 1000);
})();
</script>

        '</div>',
      '</div>'
    ].join('');
  }).join('');
}

function buildReviews(){
  var tx=t();
  $('RG').innerHTML=REVIEWS.map(function(r){
    return'<div class="RC"><div class="flex items-center justify-between mb-3"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full flex items-center justify-center font-display font-bold text-sm" style="background:rgba(57,255,20,.18);color:#39ff14;flex-shrink:0">'+r.i+'</div><div><div class="text-white font-semibold text-sm">'+r.n+'</div><div class="text-xs" style="color:rgba(224,224,224,.4)">'+tx.vfy+'</div></div></div><div class="STR text-sm">★★★★★</div></div><p class="text-sm leading-relaxed mb-4" style="color:rgba(224,224,224,.7)">'+r.t+'</p><div class="flex items-center gap-2 pt-3" style="border-top:1px solid #2A2A2A"><span class="BDG" style="font-size:.62rem;padding:.15rem .55rem">'+r.s+'</span><span class="text-xs" style="color:rgba(224,224,224,.35)">'+r.d+'</span></div></div>';
  }).join('');
}

/* ═══════════════════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════════════════ */
function openModal(sid){
  var svc=SERVICES.find(function(s){return s.id===sid}); if(!svc)return;
  curSvc=svc; selDur=null; selType=0; selQty=1; var tx=t();
  
  $('MIC').innerHTML='<div style="width:52px;height:52px">'+svc.iconSrc+'</div>';
  if(svc.iconType==='img') $('MIC').innerHTML='<img src="'+svc.iconSrc+'" style="width:52px;height:52px;object-fit:contain" alt="'+svc.id+'"/>';
  if(svc.iconType==='text') $('MIC').innerHTML='<div style="width:52px;height:52px;display:flex;align-items:center;justify-content:center;font-family:Space Grotesk,sans-serif;font-weight:900;font-size:28px;color:'+(svc.iconColor||'#fff')+'">'+svc.iconSrc+'</div>';
  
  setT('MSN',svc.n[L]); setT('MST',tx.mst);
  $('MFT').innerHTML=svc.f[L].map(function(f){return'<span style="font-size:.67rem;font-weight:600;padding:.18rem .6rem;border-radius:999px;border:1px solid rgba(57,255,20,.2);background:rgba(57,255,20,.07);color:rgba(224,224,224,.7)">'+f+'</span>'}).join('');
  
  /* Render Type Bar */
  var typWrap=$('MTYPE_WRAP'), typContainer=$('MTYPE');
  if(svc.showTypes && svc.types && svc.types[L] && svc.types[L].length > 0){
    typWrap.style.display='block';
    setT('MTPLBL', tx.typeLabel);
    typContainer.innerHTML=svc.types[L].map(function(tName, idx){
      return '<button type="button" class="TYP-BTN text-xs font-semibold px-3.5 py-2 rounded-xl border transition-all flex-shrink-0 '+(idx===selType?'SEL':'')+'" data-t="'+idx+'" style="border-color:'+(idx===selType?'#39ff14':'#2A2A2A')+';background:'+(idx===selType?'rgba(57,255,20,.15)':'#1A1A1A')+';color:'+(idx===selType?'#39ff14':'rgba(224,224,224,.7)')+';scroll-snap-align:start">'+tName+'</button>';
    }).join('');
  } else {
    typWrap.style.display='none';
    typContainer.innerHTML='';
  }
  
  /* Reset Quantity */
  setT('MQNTL', tx.qtyLabel);
  $('MQVAL').textContent=selQty;

  renderModalDurations();
  updateConfirm();
  $('MO').classList.add('O');
  document.body.style.overflow='hidden';
}

function renderModalDurations(){
  var tx=t();
  var MN=[1,2,3,6,12];
  var prices = (curSvc && curSvc.showTypes && curSvc.typePrices && curSvc.typePrices[selType]) ? curSvc.typePrices[selType] : (curSvc ? curSvc.p : []);
  var _mdoHtml='<div class="DOG">';
  prices.forEach(function(pr,i){
    var _c='<div class="DOC'+(i===4?' FULL':'')+(i===selDur?' SL':'')+'" data-i="'+i+'">';
    if(i===2)_c+='<span class="BVB">'+tx.bv+'</span>';
    _c+='<div class="DM">'+MN[i]+'<span style="font-size:.6rem;font-weight:600;color:rgba(224,224,224,.4);margin-left:3px">'+(L==='ar'?'شهر':'mo')+'</span></div>';
    _c+='<div class="DL">'+tx.dl[i]+'</div>';
    _c+='<div class="DP">'+fmtP(pr)+'</div>';
    _c+='</div>';
    _mdoHtml+=_c;
  });
  _mdoHtml+='</div>';
  $('MDO').innerHTML=_mdoHtml;
}

function closeModal(){
  $('MO').classList.remove('O'); document.body.style.overflow='';
  selDur=null; curSvc=null;
}

function updateConfirm(){
  var tx=t(), btn=$('MCB'), atcb=$('MACB');
  if(selDur!==null&&curSvc){
    var unitPr = (curSvc.showTypes && curSvc.typePrices && curSvc.typePrices[selType]) ? curSvc.typePrices[selType][selDur] : curSvc.p[selDur];
    var totalPrice = unitPr * selQty;
    btn.textContent=tx.bn+' — '+fmtP(totalPrice);btn.disabled=false;
    if(atcb){atcb.textContent=tx.atc;atcb.disabled=false;}
  } else {
    btn.textContent=tx.cf;btn.disabled=true;
    if(atcb){atcb.textContent=tx.atc||'Add to Cart 🛒';atcb.disabled=true;}
  }
}

/* ═══════════════════════════════════════════════════════════════
   EVENTS
═══════════════════════════════════════════════════════════════ */
document.addEventListener('click',function(e){
  var bc=e.target.closest('.BC[data-sid]');
  if(bc){openModal(bc.dataset.sid);return;}
  
  var typBtn=e.target.closest('.TYP-BTN[data-t]');
  if(typBtn){
    selType=parseInt(typBtn.dataset.t);
    document.querySelectorAll('.TYP-BTN').forEach(function(b){
      var isSel=parseInt(b.dataset.t)===selType;
      b.classList.toggle('SEL', isSel);
      b.style.borderColor=isSel?'#39ff14':'#2A2A2A';
      b.style.background=isSel?'rgba(57,255,20,.15)':'#1A1A1A';
      b.style.color=isSel?'#39ff14':'rgba(224,224,224,.7)';
    });
    renderModalDurations();
    updateConfirm();
    return;
  }
  
  var dopt=e.target.closest('.DOC[data-i]');
  if(dopt){selDur=parseInt(dopt.dataset.i);document.querySelectorAll('.DOC').forEach(function(d){d.classList.toggle('SL',parseInt(d.dataset.i)===selDur)});updateConfirm();return;}
  var fb=e.target.closest('.FBTN');
  if(fb){curFilt=fb.dataset.f;buildFilters();renderProducts(fb.dataset.f);return;}
  var lo=e.target.closest('.LO[data-l]');
  if(lo){applyLang(lo.dataset.l);$('LDPD').classList.remove('O');$('LDPM').classList.remove('O');return;}
  if(e.target.closest('#LTD')){$('LDPD').classList.toggle('O');return;}
  if(e.target.closest('#LTM')){$('LDPM').classList.toggle('O');return;}
  if(!e.target.closest('#LDPD')&&!e.target.closest('#LTD'))$('LDPD').classList.remove('O');
  if(!e.target.closest('#LDPM')&&!e.target.closest('#LTM'))$('LDPM').classList.remove('O');
  if(e.target===$('MO'))closeModal();
});

$('MQMIN').addEventListener('click', function(){
  if(selQty > 1){ selQty--; $('MQVAL').textContent = selQty; updateConfirm(); }
});
$('MQPLS').addEventListener('click', function(){
  if(selQty < 20){ selQty++; $('MQVAL').textContent = selQty; updateConfirm(); }
});

$('MCLB').addEventListener('click',closeModal);

function buildCartItem(){
  var DUR_MONTHS=[1,2,3,6,12]; var tx=t();
  var unitPr=(curSvc.showTypes && curSvc.typePrices && curSvc.typePrices[selType]) ? curSvc.typePrices[selType][selDur] : curSvc.p[selDur];
  var tLabel=curSvc.showTypes && curSvc.types && curSvc.types[L] ? curSvc.types[L][selType] : null;
  var tData=curSvc.showTypes && curSvc.types ? curSvc.types : null;
  return {
    id:curSvc.id, name:curSvc.n[L], nameData:curSvc.n,
    iconType:curSvc.iconType, iconSrc:curSvc.iconSrc,
    iconColor:curSvc.iconColor||null, bg:curSvc.bg,
    durIdx:selDur, durMonths:DUR_MONTHS[selDur],
    durLabel:tx.dl[selDur],
    durLabelData:{en:TX.en.dl[selDur],fr:TX.fr.dl[selDur],ar:TX.ar.dl[selDur]},
    typeIdx:selType, typeLabel:tLabel, typeLabelData:tData,
    qty:selQty, unitPrice:unitPr, price:unitPr*selQty,
    addedAt:Date.now()
  };
}

/* Buy Now → add to cart + redirect */
$('MCB').addEventListener('click',function(){
  if(selDur===null||!curSvc)return;
  var cart=JSON.parse(localStorage.getItem('strivio_cart')||'[]');
  cart.push(buildCartItem());
  localStorage.setItem('strivio_cart',JSON.stringify(cart));
  closeModal();
  window.location.href='cart.html';
});

/* Add to Cart → add + stay + toast + badge */
$('MACB').addEventListener('click',function(){
  if(selDur===null||!curSvc)return;
  var tx=t();
  var cart=JSON.parse(localStorage.getItem('strivio_cart')||'[]');
  var item=buildCartItem();
  cart.push(item);
  localStorage.setItem('strivio_cart',JSON.stringify(cart));
  updateCartBadge();
  closeModal();
  /* Show toast */
  var itemName=item.nameData?item.nameData[L]:item.name;
  $('PTTL').textContent=tx.atcok||'Added!';
  $('PTTX').textContent=itemName+' — '+fmtP(item.price);
  var pt=$('PTOAST'); pt.classList.add('SH');
  clearTimeout(pt._t); pt._t=setTimeout(function(){pt.classList.remove('SH');},3000);
});

document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});

var hb=$('HB'),mm=$('MM');
hb.addEventListener('click',function(){hb.classList.toggle('O');mm.classList.toggle('O')});
mm.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){hb.classList.remove('O');mm.classList.remove('O')})});

var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('IN');obs.unobserve(e.target)}})},{threshold:.07});
document.querySelectorAll('.RVL').forEach(function(el){obs.observe(el)});
window.addEventListener('scroll',function(){$('NAV').style.boxShadow=window.scrollY>40?'0 2px 30px rgba(0,0,0,.7)':'none'});

/* ═══════════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════════ */
document.querySelectorAll('.FEN').forEach(function(el){el.innerHTML=FL.en});
document.querySelectorAll('.FFR').forEach(function(el){el.innerHTML=FL.fr});
document.querySelectorAll('.FAR').forEach(function(el){el.innerHTML=FL.ar});
applyLang(L);
updateCartBadge();

if (typeof loadServicesFromDB === 'function') {
  loadServicesFromDB().then(function(dbServices) {
    if (dbServices && dbServices.length > 0) {
      SERVICES = dbServices;
      window.SERVICES = dbServices;
      if (typeof buildFilters === 'function') buildFilters();
      if (typeof renderProducts === 'function') renderProducts(curFilt || 'all');
    }
  });
}
