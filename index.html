.MCO{display:block;width:100%;background:var(--n);color:#121212;font-weight:700;font-family:'Space Grotesk',sans-serif;border-radius:12px;padding:.9rem;border:none;cursor:pointer;font-size:1rem;margin-top:1rem;transition:all .15s;animation:P2 3s ease-in-out infinite;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none}

.MQT{animation:MQ 28s linear infinite;display:flex;gap:.75rem;pointer-events:none !important;user-select:none !important}

    return'<button class="FBTN font-medium text-sm px-5 py-2 rounded-full border transition-all" data-f="'+k+'" style="border-color:'+(a?'rgba(57,255,20,.5)':'#2A2A2A')+';color:'+(a?'#39ff14':'rgba(224,224,224,.6)')+';background:'+(a?'rgba(57,255,20,.1)':'transparent')+'">'+tx.fl[i]+'</button>';
  }).join('');
}

var curSearch = '';
function handleSearch(val){
  curSearch = val ? val.trim().toLowerCase() : '';
  var clrBtn = $('SRCH_CLR');
  if(clrBtn) clrBtn.style.display = curSearch ? 'block' : 'none';
  renderProducts(curFilt || 'all');
}
function clearSearch(){
  var inp = $('SRCH_INP');
  if(inp) inp.value = '';
  handleSearch('');
}

function renderProducts(f){
  curFilt=f; var tx=t();
  var list=f==='all'?SERVICES:SERVICES.filter(function(s){return s.cat===f});
  if(curSearch){
    list = list.filter(function(s){
      var nAr = (s.n && s.n.ar) ? s.n.ar.toLowerCase() : '';
      var nFr = (s.n && s.n.fr) ? s.n.fr.toLowerCase() : '';
      var nEn = (s.n && s.n.en) ? s.n.en.toLowerCase() : '';
      var idStr = s.id ? s.id.toLowerCase() : '';
      var catStr = s.cat ? s.cat.toLowerCase() : '';
      var fAr = (s.f && Array.isArray(s.f.ar)) ? s.f.ar.join(' ').toLowerCase() : '';
      var fFr = (s.f && Array.isArray(s.f.fr)) ? s.f.fr.join(' ').toLowerCase() : '';
      var fEn = (s.f && Array.isArray(s.f.en)) ? s.f.en.join(' ').toLowerCase() : '';
      return nAr.indexOf(curSearch) !== -1 || nFr.indexOf(curSearch) !== -1 || nEn.indexOf(curSearch) !== -1 || idStr.indexOf(curSearch) !== -1 || catStr.indexOf(curSearch) !== -1 || fAr.indexOf(curSearch) !== -1 || fFr.indexOf(curSearch) !== -1 || fEn.indexOf(curSearch) !== -1;
    });
  }
  if(list && list.length > 0){
    list = list.slice().sort(function(a, b){
      var checkOos = function(item){
        if(item.out_of_stock === true || (item.out_of_stock && item.out_of_stock.all === true)) return 1;
        var hasP = false;
        if(item.showTypes && item.typePrices && Array.isArray(item.typePrices)){
          item.typePrices.forEach(function(tArr){ if(tArr && Array.isArray(tArr) && tArr.some(function(pr){ return pr > 0; })) hasP = true; });
        }
        if(!hasP && item.p && Array.isArray(item.p) && item.p.some(function(pr){ return pr > 0; })) hasP = true;
        return hasP ? 0 : 1;
      };
      var oosA = checkOos(a);
      var oosB = checkOos(b);
      if (oosA !== oosB) return oosA - oosB;
      return (a.sort_order || 0) - (b.sort_order || 0);
    });
  }
  if (!list || list.length === 0) {
    var loadMsg = curSearch ? (L === 'ar' ? '❌ لم يتم العثور على اشتراكات تطابق بحثك: "' + curSearch + '"' : (L === 'en' ? '❌ No subscriptions match your search: "' + curSearch + '"' : '❌ Aucun abonnement ne correspond à votre recherche : "' + curSearch + '"')) : (L === 'ar' ? '⏳ جاري جلب أحدث العروض والأسعار من السيرفر...' : (L === 'en' ? '⏳ Loading latest offers and prices from server...' : '⏳ Chargement des offres et tarifs depuis le serveur...'));
    $('PG').innerHTML = '<div class="col-span-full text-center py-12 text-gray-400 font-medium">' + loadMsg + '</div>';
    return;
  }
  var periodLabels = L === 'ar' ? ['/ شهر', '/ شهرين', '/ 3 أشهر', '/ 6 أشهر', '/ سنة'] : (L === 'en' ? ['/ mo', '/ 2 mo', '/ 3 mo', '/ 6 mo', '/ year'] : ['/ mois', '/ 2 mois', '/ 3 mois', '/ 6 mois', '/ an']);
  $('PG').innerHTML=list.map(function(s){
    var pop=s.pop?tx.pb[s.pop]:null;
    var catIdx=tx.fk.indexOf(s.cat);
    
    // Check Stock Status
    var isOos = s.out_of_stock === true || (s.out_of_stock && s.out_of_stock.all === true);
    var hasAnyPrice = false;
    if(s.showTypes && s.typePrices && Array.isArray(s.typePrices)){
      s.typePrices.forEach(function(tArr){
        if(tArr && Array.isArray(tArr) && tArr.some(function(pr){ return pr > 0; })) hasAnyPrice = true;
      });
    }
    if(!hasAnyPrice && s.p && Array.isArray(s.p) && s.p.some(function(pr){ return pr > 0; })){
      hasAnyPrice = true;
    }
    var oos = isOos || !hasAnyPrice;
    
    // Check Promo Badge & Price
    var promo = s.promo || {};
    var startP = 0;
    var startIdx = -1;
    var checkArray = function(arr){
      if(arr && Array.isArray(arr)){
        for(var idx = 0; idx < arr.length; idx++){
          if(arr[idx] > 0 && (startIdx === -1 || arr[idx] < startP)){
            startP = arr[idx];
            startIdx = idx;
          } else if(arr[idx] === startP && startIdx === -1 && arr[idx] > 0){
            startIdx = idx;
          }
        }
      }
    };
    if(s.showTypes && s.typePrices && Array.isArray(s.typePrices)){
      s.typePrices.forEach(function(tArr){ checkArray(tArr); });
    }
    if(startIdx === -1){
      checkArray(s.p);
    }
    var oldP = 0;
    if(startIdx !== -1 && promo.orig_p && Array.isArray(promo.orig_p) && promo.orig_p[startIdx] > startP){
      oldP = promo.orig_p[startIdx];
    }
    var periodText = (startIdx >= 0 && periodLabels[startIdx]) ? periodLabels[startIdx] : tx.pm;
    
    return[
      '<div class="PC'+(s.pop?' POP':'')+'" '+(oos?'':'data-sid="'+s.id+'"')+' style="'+(oos?'opacity:.65;border-color:#2a2a2a;cursor:not-allowed;':'cursor:pointer;transition:all 0.2s;')+'">',
        pop?'<div class="absolute top-3 right-3 z-10 BDG BDG-RIGHT" style="font-size:.62rem;padding:.15rem .55rem">'+escapeHtml(pop)+'</div>':'',
        (promo.badge && !oos ? '<div class="absolute top-3 left-3 z-10 BDG BDG-LEFT" style="font-size:.62rem;padding:.15rem .55rem;background:rgba(234,179,8,.15);border-color:rgba(234,179,8,.4);color:#facc15">'+escapeHtml(promo.badge)+'</div>' : ''),
        (oos ? '<div class="absolute top-3 left-3 z-10 BDG BDG-LEFT" style="font-size:.62rem;padding:.15rem .55rem;background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.4);color:#ef4444">' + escapeHtml(tx.oosBadge || 'نفد المخزون') + '</div>' : ''),
        '<div class="CIA" style="background:'+s.bg+'">'+makeIcon(s)+'</div>',
        '<div class="p-5 flex flex-col flex-1">',
          '<div class="mb-3">',
          '<div class="font-display font-bold text-white text-base leading-tight">'+escapeHtml(((s.n&&s.n[L])?s.n[L]:((s.n&&s.n.ar)?s.n.ar:s.id)))+'</div>',
            '<div class="text-xs mt-1" style="color:rgba(224,224,224,.4)">'+escapeHtml((tx.fl[catIdx]||s.cat))+'</div>',
          '</div>',
          '<ul class="mb-4 space-y-1.5">'+((s.f&&Array.isArray(s.f[L]))?s.f[L]:((s.f&&Array.isArray(s.f.ar))?s.f.ar:[])).map(function(feat){return'<li class="flex items-center gap-2 text-xs" style="color:rgba(224,224,224,.65)"><svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="'+(oos?'#666':'#39ff14')+'" stroke-width="2.5" style="flex-shrink:0"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>'+escapeHtml(feat)+'</li>'}).join('')+'</ul>',
          '<div class="mb-4"><div class="text-xs mb-0.5" style="color:rgba(224,224,224,.4)">'+tx.from+'</div><div class="TP" style="'+(oos?'color:#888;text-shadow:none':'')+'">'+fmtP(startP)+(oldP > startP ? ' <s style="font-size:.9rem;color:#777;font-weight:600;margin-right:6px;margin-left:6px">'+fmtP(oldP)+'</s>' : '')+'</div><div class="text-xs mt-0.5" style="color:rgba(224,224,224,.3)">'+periodText+'</div></div>',
          oos ? '<button class="BC" disabled style="opacity:.4;cursor:not-allowed;border-color:#333;color:#888;background:#141414">' + (tx.oosBtn || 'غير متوفر حالياً') + '</button>' : '<button class="BC" data-sid="'+s.id+'">'+tx.cd+'</button>',
        '</div>',
      '</div>'
    ].join('');
  }).join('');
}

function buildReviews(){
  var tx=t();
  if (!REVIEWS || REVIEWS.length === 0) {
    var loadMsg = L === 'ar' ? '⏳ جاري جلب تقييمات العملاء من السيرفر...' : (L === 'en' ? '⏳ Loading customer reviews from server...' : '⏳ Chargement des avis clients depuis le serveur...');
    $('RG').innerHTML = '<div class="col-span-full text-center py-12 text-gray-400 font-medium">' + loadMsg + '</div>';
    return;
  }
  $('RG').innerHTML=REVIEWS.map(function(r){
    var safeI = escapeHtml(r.i || '★');
    var safeN = escapeHtml(r.n);
    var safeT = escapeHtml(r.t);
    var safeS = escapeHtml(r.s);
    var safeD = escapeHtml(r.d);
    return'<div class="RC"><div class="flex items-center justify-between mb-3"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full flex items-center justify-center font-display font-bold text-sm" style="background:rgba(57,255,20,.18);color:#39ff14;flex-shrink:0">'+safeI+'</div><div><div class="text-white font-semibold text-sm">'+safeN+'</div><div class="text-xs" style="color:rgba(224,224,224,.4)">'+tx.vfy+'</div></div></div><div class="STR text-sm">★★★★★</div></div><p class="text-sm leading-relaxed mb-4" style="color:rgba(224,224,224,.7)">'+safeT+'</p><div class="flex items-center gap-2 pt-3" style="border-top:1px solid #2A2A2A"><span class="BDG" style="font-size:.62rem;padding:.15rem .55rem">'+safeS+'</span><span class="text-xs" style="color:rgba(224,224,224,.35)">'+safeD+'</span></div></div>';
  }).join('');
}

/* ═══════════════════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════════════════ */
function openModal(sid){
  var svc=SERVICES.find(function(s){return s.id===sid}); if(!svc)return;
  curSvc=svc; selDur=null; selType=0; selQty=1; var tx=t();
  
  $('MIC').innerHTML='<div style="width:52px;height:52px">'+svc.iconSrc+'</div>';
  if(svc.iconType==='img') $('MIC').innerHTML='<img src="'+svc.iconSrc+'" style="width:52px;height:52px;object-fit:contain" alt="'+svc.id+'"/>';
  if(svc.iconType==='text') $('MIC').innerHTML='<div style="width:52px;height:52px;display:flex;align-items:center;justify-content:center;font-family:Space Grotesk,sans-serif;font-weight:900;font-size:28px;color:'+(svc.iconColor||'#fff')+'">'+svc.iconSrc+'</div>';
  
  setT('MSN',((svc.n&&svc.n[L])?svc.n[L]:((svc.n&&svc.n.ar)?svc.n.ar:svc.id))); setT('MST',tx.mst);
  $('MFT').innerHTML=((svc.f&&Array.isArray(svc.f[L]))?svc.f[L]:((svc.f&&Array.isArray(svc.f.ar))?svc.f.ar:[])).map(function(f){return'<span style="font-size:.67rem;font-weight:600;padding:.18rem .6rem;border-radius:999px;border:1px solid rgba(57,255,20,.2);background:rgba(57,255,20,.07);color:rgba(224,224,224,.7)">'+f+'</span>'}).join('');
  
  /* Render Type Bar */
  var typWrap=$('MTYPE_WRAP'), typContainer=$('MTYPE');
  var curTypes = ((svc.types&&Array.isArray(svc.types[L]))?svc.types[L]:((svc.types&&Array.isArray(svc.types.ar))?svc.types.ar:[]));
  if(svc.showTypes && curTypes && curTypes.length > 0){
    typWrap.style.display='block';
    setT('MTPLBL', tx.typeLabel);
    typContainer.innerHTML=curTypes.map(function(tName, idx){
      return '<button type="button" class="TYP-BTN text-xs font-semibold px-3.5 py-2 rounded-xl border transition-all flex-shrink-0 '+(idx===selType?'SEL':'')+'" data-t="'+idx+'" style="border-color:'+(idx===selType?'#39ff14':'#2A2A2A')+';background:'+(idx===selType?'rgba(57,255,20,.15)':'#1A1A1A')+';color:'+(idx===selType?'#39ff14':'rgba(224,224,224,.7)')+';scroll-snap-align:start">'+tName+'</button>';
    }).join('');
  } else {
    typWrap.style.display='none';
    typContainer.innerHTML='';
  }
  
  /* Reset Quantity */
  setT('MQNTL', tx.qtyLabel);
  $('MQVAL').textContent=selQty;

  renderModalDurations();
  updateConfirm();
  $('MO').classList.add('O');
  document.body.style.overflow='hidden';
}

function renderModalDurations(){
  var tx=t();
  var MN=[1,2,3,6,12];
  var prices = (curSvc && curSvc.showTypes && curSvc.typePrices && curSvc.typePrices[selType]) ? curSvc.typePrices[selType] : (curSvc ? curSvc.p : []);
  var origPrices = (curSvc && curSvc.promo && curSvc.promo.orig_p) ? curSvc.promo.orig_p : [];
  var durNotes = (curSvc && curSvc.dur_notes && Array.isArray(curSvc.dur_notes)) ? curSvc.dur_notes : ((curSvc && curSvc.promo && curSvc.promo.dur_notes && Array.isArray(curSvc.promo.dur_notes)) ? curSvc.promo.dur_notes : []);
  var bvIdx = (curSvc && typeof curSvc.best_value !== 'undefined' && curSvc.best_value !== null) ? parseInt(curSvc.best_value) : 2;
  var _mdoHtml='<div class="DOG">';
  prices.forEach(function(pr,i){
    var isOos = !pr || pr <= 0 || (curSvc.out_of_stock && curSvc.out_of_stock.dur && curSvc.out_of_stock.dur[i]);
    var oldPr = origPrices[i] || 0;
    var noteStr = (durNotes[i] && durNotes[i].trim() !== '') ? durNotes[i] : (L === 'ar' ? 'ضمان كامل للمدة' : (L === 'en' ? 'Full Period Guarantee' : 'Garantie complète'));
    
    var _c='<div class="DOC'+(i===4?' FULL':'')+(i===selDur && !isOos?' SL':'')+(isOos?' DIS':'')+'" data-i="'+i+'" style="'+(isOos?'opacity:.4;cursor:not-allowed;border-color:#222;background:#111':'')+'">';
    if(i===bvIdx && !isOos)_c+='<span class="BVB">'+tx.bv+'</span>';
    _c+='<div class="DM">'+MN[i]+'<span style="font-size:.6rem;font-weight:600;color:rgba(224,224,224,.4);margin-left:3px">'+(L==='ar'?'شهر':'mo')+'</span></div>';
    _c+='<div class="DL">'+noteStr+'</div>';
    if(isOos){
      _c+='<div class="DP" style="color:#ef4444;font-size:.8rem;margin-top:auto;padding-top:0.3rem">' + (tx.oosDur || 'غير متوفر حالياً') + '</div>';
    } else {
      _c+='<div class="DP" style="margin-top:auto;padding-top:0.3rem">'+fmtP(pr)+(oldPr > pr ? ' <s style="font-size:.75rem;color:#777;font-weight:600;margin-right:4px;margin-left:4px">'+fmtP(oldPr)+'</s>' : '')+'</div>';
    }
    _c+='</div>';
    _mdoHtml+=_c;
  });
  _mdoHtml+='</div>';
  $('MDO').innerHTML=_mdoHtml;
}

function closeModal(){
  $('MO').classList.remove('O'); document.body.style.overflow='';
  selDur=null; curSvc=null;
}

function updateConfirm(){
  var tx=t(), btn=$('MCB'), atcb=$('MACB');
  if(selDur!==null&&curSvc){
    var unitPr = (curSvc.showTypes && curSvc.typePrices && curSvc.typePrices[selType]) ? curSvc.typePrices[selType][selDur] : curSvc.p[selDur];
    var totalPrice = unitPr * selQty;
    btn.innerHTML=tx.bn+' — '+fmtP(totalPrice);btn.disabled=false;
    if(atcb){atcb.innerHTML=tx.atc;atcb.disabled=false;}
  } else {
    btn.innerHTML=tx.cf;btn.disabled=true;
    if(atcb){atcb.innerHTML=tx.atc||'Add to Cart 🛒';atcb.disabled=true;}
  }
}

/* ═══════════════════════════════════════════════════════════════
   EVENTS
═══════════════════════════════════════════════════════════════ */
document.addEventListener('click',function(e){
  var bc=e.target.closest('.BC[data-sid]') || e.target.closest('.PC[data-sid]');
  if(bc){openModal(bc.dataset.sid);return;}
  
  var typBtn=e.target.closest('.TYP-BTN[data-t]');
  if(typBtn){
    selType=parseInt(typBtn.dataset.t);
    document.querySelectorAll('.TYP-BTN').forEach(function(b){
      var isSel=parseInt(b.dataset.t)===selType;
      b.classList.toggle('SEL', isSel);
      b.style.borderColor=isSel?'#39ff14':'#2A2A2A';
      b.style.background=isSel?'rgba(57,255,20,.15)':'#1A1A1A';
      b.style.color=isSel?'#39ff14':'rgba(224,224,224,.7)';
    });
    renderModalDurations();
    updateConfirm();
    return;
  }
  
  var dopt=e.target.closest('.DOC[data-i]');
  if(dopt){
    if(dopt.classList.contains('DIS') || dopt.style.cursor === 'not-allowed') return;
    selDur=parseInt(dopt.dataset.i);
    document.querySelectorAll('.DOC').forEach(function(d){d.classList.toggle('SL',parseInt(d.dataset.i)===selDur)});
    updateConfirm();
    return;
  }
  var fb=e.target.closest('.FBTN');
  if(fb){curFilt=fb.dataset.f;buildFilters();renderProducts(fb.dataset.f);return;}
  var lo=e.target.closest('.LO[data-l]');
  if(lo){applyLang(lo.dataset.l);$('LDPD').classList.remove('O');$('LDPM').classList.remove('O');return;}
  if(e.target.closest('#LTD')){$('LDPD').classList.toggle('O');return;}
  if(e.target.closest('#LTM')){$('LDPM').classList.toggle('O');return;}
  if(!e.target.closest('#LDPD')&&!e.target.closest('#LTD'))$('LDPD').classList.remove('O');
  if(!e.target.closest('#LDPM')&&!e.target.closest('#LTM'))$('LDPM').classList.remove('O');
  if(e.target===$('MO'))closeModal();
});

$('MQMIN').addEventListener('click', function(){
  if(selQty > 1){ selQty--; $('MQVAL').textContent = selQty; updateConfirm(); }
});
$('MQPLS').addEventListener('click', function(){
  if(selQty < 20){ selQty++; $('MQVAL').textContent = selQty; updateConfirm(); }
});

$('MCLB').addEventListener('click',closeModal);

function buildCartItem(){
  var DUR_MONTHS=[1,2,3,6,12]; var tx=t();
  var unitPr=(curSvc.showTypes && curSvc.typePrices && curSvc.typePrices[selType]) ? curSvc.typePrices[selType][selDur] : curSvc.p[selDur];
  var tLabel=curSvc.showTypes && curSvc.types && curSvc.types[L] ? curSvc.types[L][selType] : null;
  var tData=curSvc.showTypes && curSvc.types ? curSvc.types : null;
  return {
    id:curSvc.id, name:curSvc.n[L], nameData:curSvc.n,
    iconType:curSvc.iconType, iconSrc:curSvc.iconSrc,
    iconColor:curSvc.iconColor||null, bg:curSvc.bg,
    durIdx:selDur, durMonths:DUR_MONTHS[selDur],
    durLabel:tx.dl[selDur],
    durLabelData:{en:TX.en.dl[selDur],fr:TX.fr.dl[selDur],ar:TX.ar.dl[selDur]},
    typeIdx:selType, typeLabel:tLabel, typeLabelData:tData,
    qty:selQty, unitPrice:unitPr, price:unitPr*selQty,
    addedAt:Date.now()
  };
}

/* Buy Now → add to cart + redirect */
$('MCB').addEventListener('click',function(){
  if(selDur===null||!curSvc)return;
  var cart=JSON.parse(localStorage.getItem('strivio_cart')||'[]');
  cart.push(buildCartItem());
  localStorage.setItem('strivio_cart',JSON.stringify(cart));
  closeModal();
  window.location.href='cart';
});

/* Add to Cart → add + stay + toast + badge */
$('MACB').addEventListener('click',function(){
  if(selDur===null||!curSvc)return;
  var tx=t();
  var cart=JSON.parse(localStorage.getItem('strivio_cart')||'[]');
  var item=buildCartItem();
  cart.push(item);
  localStorage.setItem('strivio_cart',JSON.stringify(cart));
  updateCartBadge();
  closeModal();
  /* Show toast */
  var itemName=item.nameData?item.nameData[L]:item.name;
  $('PTTL').textContent=tx.atcok||'Added!';
  $('PTTX').innerHTML=itemName+' — '+fmtP(item.price);
  var pt=$('PTOAST'); pt.classList.add('SH');
  clearTimeout(pt._t); pt._t=setTimeout(function(){pt.classList.remove('SH');},3000);
});

document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});

var hb=$('HB'),mm=$('MM');
hb.addEventListener('click',function(){hb.classList.toggle('O');mm.classList.toggle('O')});
mm.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){hb.classList.remove('O');mm.classList.remove('O')})});

var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('IN');obs.unobserve(e.target)}})},{threshold:.07});
document.querySelectorAll('.RVL').forEach(function(el){obs.observe(el)});
window.addEventListener('scroll',function(){$('NAV').style.boxShadow=window.scrollY>40?'0 2px 30px rgba(0,0,0,.7)':'none'});

   INIT
═══════════════════════════════════════════════════════════════ */
document.querySelectorAll('.FEN').forEach(function(el){el.innerHTML=FL.en});
document.querySelectorAll('.FFR').forEach(function(el){el.innerHTML=FL.fr});
document.querySelectorAll('.FAR').forEach(function(el){el.innerHTML=FL.ar});
applyLang(L);
updateCartBadge();

if (typeof loadServicesFromDB === 'function') {
  loadServicesFromDB().then(function(dbServices) {
    if (dbServices && dbServices.length > 0) {
      SERVICES = dbServices;
      window.SERVICES = dbServices;
      if (typeof buildFilters === 'function') buildFilters();
      if (typeof renderProducts === 'function') renderProducts(curFilt || 'all');
    }
  });
}

if (typeof loadSettingsFromDB === 'function') {
  loadSettingsFromDB().then(function(dbSettings) {
    if (dbSettings) {
      CONFIG = dbSettings;
      window.CONFIG = dbSettings;
      if (typeof buildSocials === 'function') buildSocials();
    }
  });
}

if (typeof loadReviewsFromDB === 'function') {
  loadReviewsFromDB().then(function(dbReviews) {
    if (dbReviews && dbReviews.length > 0) {
      REVIEWS = dbReviews;
      window.REVIEWS = dbReviews;
      if (typeof buildReviews === 'function') buildReviews();
    }
  });
}
