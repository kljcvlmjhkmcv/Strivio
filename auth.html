<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <script src="clean-url.js"></script>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><title>Strivio — Account</title>
  <link rel="stylesheet" href="assets/tailwind.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--n:#39ff14;--bg:#0a0a0a;--card:#151515;--line:#292929}*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:#eee;min-height:100vh;overflow-x:hidden}.display{font-family:'Space Grotesk',Inter,sans-serif}.grid-bg{background-image:linear-gradient(rgba(57,255,20,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(57,255,20,.035) 1px,transparent 1px);background-size:46px 46px}.orb{position:fixed;width:420px;height:420px;border-radius:50%;filter:blur(130px);background:rgba(57,255,20,.12);pointer-events:none}.shell{background:rgba(17,17,17,.88);border:1px solid rgba(255,255,255,.08);box-shadow:0 35px 120px rgba(0,0,0,.65);backdrop-filter:blur(22px)}.panel{background:linear-gradient(145deg,rgba(57,255,20,.09),rgba(57,255,20,.01));border-inline-end:1px solid rgba(255,255,255,.07)}[dir=ltr] .panel{border-inline-end:0;border-inline-start:1px solid rgba(255,255,255,.07)}.input{width:100%;background:#0e0e0e;border:1px solid #303030;border-radius:14px;padding:13px 15px;color:#fff;outline:none;transition:.2s}.input:focus{border-color:var(--n);box-shadow:0 0 0 3px rgba(57,255,20,.08)}.primary{background:var(--n);color:#080808;font-weight:900;border:0;border-radius:14px;padding:14px;width:100%;cursor:pointer;transition:.22s;box-shadow:0 10px 30px rgba(57,255,20,.16)}.primary:hover{transform:translateY(-1px);box-shadow:0 14px 36px rgba(57,255,20,.26)}.primary:disabled{opacity:.55;transform:none}.ghost{background:#111;border:1px solid #303030;color:#eee;border-radius:14px;padding:13px;width:100%;cursor:pointer;transition:.2s}.ghost:hover{border-color:#555;background:#171717}.tab{color:#777;border-bottom:2px solid transparent;transition:.2s}.tab.active{color:var(--n);border-color:var(--n)}.lang{border:1px solid #303030;color:#888;border-radius:10px;padding:6px 10px;font-size:12px}.lang.active{color:#080808;background:var(--n);border-color:var(--n)}@media(max-width:850px){.panel{display:none}.shell{max-width:480px}.form-side{grid-column:1/-1}}
  </style>
  <link rel="stylesheet" href="site-shell.css">
</head>
<body class="site-safe-page grid-bg flex items-center justify-center p-4 sm:p-7">
  <div class="orb -top-48 -left-32"></div><div class="orb -bottom-52 -right-28" style="opacity:.55"></div>
  <main class="shell relative w-full max-w-5xl rounded-[30px] overflow-hidden grid md:grid-cols-2 z-10">
    <section class="form-side p-6 sm:p-10 md:p-12">
      <div class="flex items-center justify-between mb-8"><a href="./" class="display text-3xl font-black text-[#39ff14] no-underline">Strivio</a><div class="flex gap-1"><button class="lang" data-lang="ar">AR</button><button class="lang" data-lang="fr">FR</button><button class="lang" data-lang="en">EN</button></div></div>
      <div class="mb-7"><span class="inline-flex px-3 py-1 rounded-full text-[11px] font-bold border border-[#39ff14]/25 bg-[#39ff14]/10 text-[#39ff14]" data-t="badge"></span><h1 class="display text-3xl sm:text-4xl font-black mt-4 mb-2" data-t="title"></h1><p class="text-sm text-gray-500 leading-6" data-t="subtitle"></p></div>
      <button onclick="googleLogin()" class="ghost flex items-center justify-center gap-3 mb-5"><span class="w-7 h-7 rounded-full bg-white text-black flex items-center justify-center font-black">G</span><b data-t="google"></b></button>
      <div class="flex items-center gap-3 text-xs text-gray-600 mb-5"><span class="h-px bg-gray-800 flex-1"></span><span data-t="or"></span><span class="h-px bg-gray-800 flex-1"></span></div>
      <div class="flex mb-5 border-b border-gray-800"><button id="loginTab" onclick="mode('login')" class="tab active flex-1 pb-3 font-bold" data-t="loginTab"></button><button id="signupTab" onclick="mode('signup')" class="tab flex-1 pb-3 font-bold" data-t="signupTab"></button></div>
      <form id="form" class="space-y-3"><div id="names" class="grid grid-cols-2 gap-3 hidden"><input id="first" class="input" data-ph="first"><input id="last" class="input" data-ph="last"></div><input id="email" type="email" class="input" data-ph="email" required><input id="password" type="password" minlength="8" class="input" data-ph="password" required><button class="primary" id="submit"></button></form>
      <p id="msg" class="text-sm text-center mt-4 min-h-5"></p><p class="text-[11px] text-gray-600 text-center mt-5" data-t="privacy"></p>
    </section>
    <aside class="panel p-10 md:p-14 flex flex-col justify-between relative overflow-hidden"><div><div class="w-14 h-14 rounded-2xl border border-[#39ff14]/30 bg-[#39ff14]/10 flex items-center justify-center text-2xl mb-8">✦</div><h2 class="display text-4xl font-black leading-tight mb-5" data-t="sideTitle"></h2><p class="text-gray-400 leading-7" data-t="sideText"></p></div><div class="space-y-3 mt-10"><div class="rounded-2xl border border-white/5 bg-black/25 p-4 flex gap-3"><span class="text-[#39ff14]">✓</span><span data-t="benefit1"></span></div><div class="rounded-2xl border border-white/5 bg-black/25 p-4 flex gap-3"><span class="text-[#39ff14]">✓</span><span data-t="benefit2"></span></div><div class="rounded-2xl border border-white/5 bg-black/25 p-4 flex gap-3"><span class="text-[#39ff14]">✓</span><span data-t="benefit3"></span></div></div></aside>
  </main>
  <script src="supabase-client.js?v=8d6b077"></script>
  <script>
    const I18N={ar:{badge:'حسابك الآمن',title:'مرحبًا بك في Strivio',subtitle:'سجّل دخولك لمتابعة طلباتك واستلام اشتراكاتك فورًا.',google:'المتابعة عبر Google',or:'أو بالبريد',loginTab:'تسجيل الدخول',signupTab:'حساب جديد',first:'الاسم',last:'اللقب',email:'البريد الإلكتروني',password:'كلمة السر (8 أحرف على الأقل)',loginBtn:'دخول آمن',signupBtn:'إنشاء الحساب',privacy:'لن نرسل عروضًا إلا بعد موافقتك الصريحة.',sideTitle:'كل طلباتك في مكان واحد.',sideText:'استلم الحسابات والأكواد بأمان، تابع مدة اشتراكك، وحمّل مستند طلبك وقتما تريد.',benefit1:'تسليم فوري بعد تأكيد الدفع',benefit2:'سجل كامل ومعلومات محمية',benefit3:'وصول من الهاتف أو الكمبيوتر',working:'جاري التحقق...',confirm:'أرسلنا رابط تأكيد إلى بريدك. افتحه ثم سجّل الدخول.',googleError:'تعذر تسجيل Google حاليًا. استخدم البريد أو حاول مجددًا.'},fr:{badge:'Votre compte sécurisé',title:'Bienvenue sur Strivio',subtitle:'Connectez-vous pour suivre vos commandes et recevoir vos abonnements instantanément.',google:'Continuer avec Google',or:'ou par e-mail',loginTab:'Connexion',signupTab:'Créer un compte',first:'Prénom',last:'Nom',email:'Adresse e-mail',password:'Mot de passe (8 caractères minimum)',loginBtn:'Connexion sécurisée',signupBtn:'Créer mon compte',privacy:'Aucune offre ne sera envoyée sans votre consentement explicite.',sideTitle:'Toutes vos commandes au même endroit.',sideText:'Recevez vos comptes et licences en toute sécurité, suivez vos abonnements et téléchargez vos documents.',benefit1:'Livraison instantanée après paiement',benefit2:'Historique complet et données protégées',benefit3:'Accessible sur mobile et ordinateur',working:'Vérification...',confirm:'Un lien de confirmation a été envoyé. Ouvrez-le puis connectez-vous.',googleError:'Google est temporairement indisponible. Utilisez votre e-mail ou réessayez.'},en:{badge:'Your secure account',title:'Welcome to Strivio',subtitle:'Sign in to track orders and receive subscriptions instantly.',google:'Continue with Google',or:'or use email',loginTab:'Sign in',signupTab:'Create account',first:'First name',last:'Last name',email:'Email address',password:'Password (8 characters minimum)',loginBtn:'Secure sign in',signupBtn:'Create my account',privacy:'We never send promotions without your explicit consent.',sideTitle:'Every order in one place.',sideText:'Receive accounts and licenses securely, track subscriptions, and download order documents anytime.',benefit1:'Instant delivery after payment',benefit2:'Complete history and protected data',benefit3:'Access on mobile and desktop',working:'Checking...',confirm:'We sent a confirmation link. Open it, then sign in.',googleError:'Google sign-in is temporarily unavailable. Use email or try again.'}};
    let current='login',lang=localStorage.getItem('strivio_lang')||'ar';
    function tx(){return I18N[lang]||I18N.ar}function applyLang(l){lang=l;localStorage.setItem('strivio_lang',l);document.documentElement.lang=l;document.documentElement.dir=l==='ar'?'rtl':'ltr';document.querySelectorAll('[data-t]').forEach(x=>x.textContent=tx()[x.dataset.t]||'');document.querySelectorAll('[data-ph]').forEach(x=>x.placeholder=tx()[x.dataset.ph]||'');document.querySelectorAll('.lang').forEach(x=>x.classList.toggle('active',x.dataset.lang===l));document.getElementById('submit').textContent=current==='login'?tx().loginBtn:tx().signupBtn}document.querySelectorAll('.lang').forEach(b=>b.onclick=()=>applyLang(b.dataset.lang));
    function nextUrl(){
      const fallback='my-account';
      let raw=(new URLSearchParams(location.search).get('next')||fallback).trim();
      if(!raw||/[\\\u0000-\u001f\u007f]/.test(raw)||/^(?:[a-z][a-z0-9+.-]*:|\/\/)/i.test(raw))return fallback;
      try{
        const target=new URL(raw,location.origin+location.pathname);
        if(target.origin!==location.origin)return fallback;
        const cleanPath=target.pathname.replace(/^\/+|\/+$/g,'').replace(/\.html$/i,'');
        if(!['my-account','cart'].includes(cleanPath))return fallback;
        return cleanPath+target.search+target.hash;
      }catch(_){return fallback}
    }
    function mode(m){current=m;document.getElementById('names').classList.toggle('hidden',m!=='signup');document.getElementById('loginTab').classList.toggle('active',m==='login');document.getElementById('signupTab').classList.toggle('active',m==='signup');applyLang(lang)}
    async function googleLogin(){const {error}=await window.supabaseClient.auth.signInWithOAuth({provider:'google',options:{redirectTo:new URL(nextUrl(),location.href).href}});if(error){const m=document.getElementById('msg');m.style.color='#ff6b6b';m.textContent=tx().googleError}}
    document.getElementById('form').addEventListener('submit',async e=>{e.preventDefault();const msg=document.getElementById('msg'),btn=document.getElementById('submit');btn.disabled=true;msg.style.color='#aaa';msg.textContent=tx().working;const email=document.getElementById('email').value.trim(),password=document.getElementById('password').value;let result;if(current==='signup')result=await window.supabaseClient.auth.signUp({email,password,options:{emailRedirectTo:new URL(nextUrl(),location.href).href,data:{first_name:document.getElementById('first').value.trim(),last_name:document.getElementById('last').value.trim()}}});else result=await window.supabaseClient.auth.signInWithPassword({email,password});btn.disabled=false;if(result.error){msg.style.color='#ff6b6b';msg.textContent=result.error.message;return}if(current==='signup'&&!result.data.session){msg.style.color='#39ff14';msg.textContent=tx().confirm;return}location.href=nextUrl()});applyLang(lang);window.supabaseClient.auth.getSession().then(({data})=>{if(data.session)location.href=nextUrl()});
  </script>
</body></html>
