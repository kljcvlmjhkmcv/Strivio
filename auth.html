<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>حساب Strivio</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>body{font-family:Arial,sans-serif;background:#0c0c0c;color:#eee}.card{background:rgba(24,24,24,.95);border:1px solid #2a2a2a;box-shadow:0 30px 80px #000}.inp{width:100%;background:#101010;border:1px solid #333;border-radius:12px;padding:12px 14px;outline:none}.inp:focus{border-color:#39ff14}.primary{background:#39ff14;color:#080808;font-weight:800;border-radius:12px;padding:13px;width:100%}.ghost{border:1px solid #3a3a3a;border-radius:12px;padding:13px;width:100%}.tab.active{color:#39ff14;border-color:#39ff14}</style></head><body class="min-h-screen flex items-center justify-center p-4"><main class="card w-full max-w-md rounded-3xl p-6 sm:p-8"><a href="./" class="block text-center text-3xl font-black text-[#39ff14] mb-2">Strivio</a><p class="text-center text-gray-400 text-sm mb-7">حساب واحد لكل طلباتك وتسليمك الآمن</p><button onclick="googleLogin()" class="ghost flex items-center justify-center gap-3 mb-5"><span class="text-xl">G</span><b>المتابعة عبر Google</b></button><div class="flex items-center gap-3 text-xs text-gray-500 mb-5"><span class="h-px bg-gray-800 flex-1"></span>أو بالبريد<span class="h-px bg-gray-800 flex-1"></span></div><div class="flex mb-5 border-b border-gray-800"><button id="loginTab" onclick="mode('login')" class="tab active flex-1 pb-3 border-b-2">تسجيل الدخول</button><button id="signupTab" onclick="mode('signup')" class="tab flex-1 pb-3 border-b-2 border-transparent">حساب جديد</button></div><form id="form" class="space-y-3"><div id="names" class="grid grid-cols-2 gap-3 hidden"><input id="first" class="inp" placeholder="الاسم"><input id="last" class="inp" placeholder="اللقب"></div><input id="email" type="email" class="inp" placeholder="البريد الإلكتروني" required><input id="password" type="password" minlength="8" class="inp" placeholder="كلمة السر (8 أحرف على الأقل)" required><button class="primary" id="submit">دخول آمن</button></form><p id="msg" class="text-sm text-center mt-4 min-h-5"></p><p class="text-xs text-gray-500 text-center mt-5">لن نرسل لك عروضًا إلا بعد موافقتك الصريحة أثناء الدفع.</p></main><script src="supabase-client.js"></script><script>let current='login';function nextUrl(){const n=new URLSearchParams(location.search).get('next')||'my-account.html';return n.startsWith('http')?'my-account.html':n}function mode(m){current=m;document.getElementById('names').classList.toggle('hidden',m!=='signup');document.getElementById('loginTab').classList.toggle('active',m==='login');document.getElementById('signupTab').classList.toggle('active',m==='signup');document.getElementById('submit').textContent=m==='login'?'دخول آمن':'إنشاء الحساب';}async function googleLogin(){await window.supabaseClient.auth.signInWithOAuth({provider:'google',options:{redirectTo:new URL(nextUrl(),location.href).href}})}document.getElementById('form').addEventListener('submit',async e=>{e.preventDefault();const msg=document.getElementById('msg'),btn=document.getElementById('submit');btn.disabled=true;msg.textContent='جاري التحقق...';const email=document.getElementById('email').value.trim(),password=document.getElementById('password').value;let result;if(current==='signup'){result=await window.supabaseClient.auth.signUp({email,password,options:{emailRedirectTo:new URL(nextUrl(),location.href).href,data:{first_name:document.getElementById('first').value.trim(),last_name:document.getElementById('last').value.trim()}}})}else result=await window.supabaseClient.auth.signInWithPassword({email,password});btn.disabled=false;if(result.error){msg.style.color='#ff6b6b';msg.textContent=result.error.message;return}if(current==='signup'&&!result.data.session){msg.style.color='#39ff14';msg.textContent='أرسلنا رابط تأكيد إلى بريدك. افتحه ثم سجّل الدخول.';return}location.href=nextUrl()});window.supabaseClient.auth.getSession().then(({data})=>{if(data.session)location.href=nextUrl()});</script></body></html>
