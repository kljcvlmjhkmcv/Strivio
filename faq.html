<!DOCTYPE html>
<html lang="fr" dir="ltr" id="HR" class="scroll-smooth">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Strivio — Questions Fréquentes (FAQ)</title>
<meta name="description" content="Trouvez les réponses à toutes vos questions concernant vos abonnements Strivio, la livraison, la garantie et les paiements."/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet"/>
<script>tailwind.config={theme:{extend:{colors:{brand:{black:'#121212',neon:'#39ff14',card:'#181818',border:'#2A2A2A'}},fontFamily:{sans:['Inter','sans-serif'],display:['Space Grotesk','sans-serif']}}}}</script>
<style>
:root{--n:#39ff14;--nr:57,255,20}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-family:Inter,sans-serif;background:#121212;color:#E0E0E0;overflow-x:hidden !important;width:100%;max-width:100%}
body{background:#121212;overflow-x:hidden !important;width:100%;max-width:100%;position:relative}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#121212}::-webkit-scrollbar-thumb{background:var(--n);border-radius:99px}
.NT{color:var(--n);text-shadow:0 0 18px rgba(var(--nr),.5)}
.GN{background:rgba(18,18,18,.82);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);border-bottom:1px solid rgba(var(--nr),.08)}
.BO{border:1.5px solid var(--n);color:var(--n);font-weight:600;font-family:'Space Grotesk',sans-serif;border-radius:9999px;padding:.48rem 1.3rem;transition:all .2s;background:transparent;cursor:pointer;font-size:.875rem;text-decoration:none;display:inline-block}
.BO:hover{background:var(--n);color:#121212;box-shadow:0 0 20px rgba(var(--nr),.4)}
.LO{display:flex;align-items:center;gap:.65rem;width:100%;padding:.6rem 1rem;font-size:.875rem;color:#E0E0E0;background:transparent;border:none;cursor:pointer;transition:all .15s;text-align:left;white-space:nowrap}
.LO:hover{background:rgba(var(--nr),.1);color:var(--n)}
.LO.AC{color:var(--n)}
#MM{display:none;flex-direction:column;gap:.75rem;padding:1.25rem 1.5rem;background:rgba(18,18,18,.97);border-top:1px solid rgba(var(--nr),.1)}
#MM.O{display:flex}
.HMB span{display:block;width:22px;height:2px;background:#E0E0E0;border-radius:2px;transition:all .3s}
.FAQ-ITEM{background:#181818;border:1px solid #2A2A2A;border-radius:16px;overflow:hidden;transition:all .25s ease}
.FAQ-ITEM:hover{border-color:rgba(var(--nr),.3);box-shadow:0 4px 20px rgba(0,0,0,.4)}
.FAQ-HEADER{padding:1.25rem 1.5rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;gap:1rem}
.FAQ-BODY{padding:0 1.5rem 1.25rem 1.5rem;color:rgba(224,224,224,.75);font-size:.925rem;line-height:1.65;display:none;border-top:1px solid rgba(255,255,255,.05);margin-top:.5rem;padding-top:1rem}
.FAQ-ITEM.OPEN .FAQ-BODY{display:block}
.FAQ-ITEM.OPEN .FAQ-ICON{transform:rotate(180deg);color:var(--n)}
#LDPD.O,#LDPM.O{display:block}
#LDPD,#LDPM{box-shadow:0 8px 30px rgba(0,0,0,.5)}
[dir=rtl] .LO{text-align:right;flex-direction:row-reverse}
</style>
<script src="supabase-client.js"></script>
<script>
(function(){
  if(window.location.pathname.endsWith('.html')){
    window.history.replaceState(null,'',window.location.pathname.replace(/\.html$/,'')+window.location.search+window.location.hash);
  }
})();
</script>
<script>
(function(){
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
  document.addEventListener('keydown', function(e){
    if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) || (e.ctrlKey && (e.key === 'U' || e.key === 'u' || e.key === 'S' || e.key === 's'))) {
      e.preventDefault();
    }
  });
})();
</script>
</head>
<body class="overflow-x-hidden" style="background:#121212">

<!-- NAV -->
<header id="NAV" class="GN fixed top-0 left-0 right-0 z-50 transition-shadow duration-300">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16">
    <a href="./" class="NT font-display font-bold text-2xl select-none" style="text-decoration:none">Strivio</a>
    <nav class="hidden lg:flex items-center gap-7">
      <a href="./" class="text-sm font-medium hover:text-white transition-colors" style="color:rgba(224,224,224,.75);text-decoration:none" id="NLH"></a>
      <a href="./#subs" class="text-sm font-medium hover:text-white transition-colors" style="color:rgba(224,224,224,.75);text-decoration:none" id="NLS"></a>
      <a href="faq" class="text-sm font-medium text-white transition-colors" style="text-decoration:none" id="NLF">FAQ</a>
    </nav>
    <div class="hidden lg:flex items-center gap-3">
      <div class="relative">
        <button id="LTD" class="flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg border transition-all" style="border-color:#2A2A2A;background:#1A1A1A">
          <span id="FLD"></span><span id="LCD" class="font-bold text-white text-xs"></span>
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="rgba(224,224,224,.5)" stroke-width="2.5" stroke-linecap="round"><path d="m6 9 6 6 6-6"/></svg>
        </button>
        <div id="LDPD" class="absolute right-0 top-full mt-2 hidden rounded-xl overflow-hidden z-50" style="background:#1A1A1A;border:1px solid #2A2A2A;min-width:140px">
          <button class="LO" data-l="en"><span class="FEN"></span><span>English</span></button>
          <button class="LO" data-l="fr"><span class="FFR"></span><span>Français</span></button>
          <button class="LO" data-l="ar"><span class="FAR"></span><span>العربية</span></button>
        </div>
      </div>
      <a id="CRTB" href="cart" class="relative flex items-center gap-2 px-3 py-2 rounded-xl transition-all" style="border:1.5px solid #2A2A2A;background:#1A1A1A;text-decoration:none;color:#E0E0E0">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      </a>
      <a id="NTB" class="BO" href="https://wa.me/213562961410" target="_blank">Commander</a>
    </div>
    <div class="flex lg:hidden items-center gap-2">
      <div class="relative">
        <button id="LTM" class="flex items-center gap-1 px-2 py-1.5 rounded-lg border" style="border-color:#2A2A2A;background:#1A1A1A">
          <span id="FLDM"></span>
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="rgba(224,224,224,.5)" stroke-width="2.5" stroke-linecap="round"><path d="m6 9 6 6 6-6"/></svg>
        </button>
        <div id="LDPM" class="absolute right-0 top-full mt-2 hidden rounded-xl overflow-hidden z-50" style="background:#1A1A1A;border:1px solid #2A2A2A;min-width:140px">
          <button class="LO" data-l="en"><span class="FEN"></span><span>English</span></button>
          <button class="LO" data-l="fr"><span class="FFR"></span><span>Français</span></button>
          <button class="LO" data-l="ar"><span class="FAR"></span><span>العربية</span></button>
        </div>
      </div>
      <button id="HB" class="HMB flex flex-col gap-[5px] cursor-pointer p-1"><span></span><span></span><span></span></button>
    </div>
  </div>
  <div id="MM">
    <a href="./" style="text-decoration:none;color:#E0E0E0" class="text-sm font-medium" id="MLH"></a>
    <a href="./#subs" style="text-decoration:none;color:#E0E0E0" class="text-sm font-medium" id="MLS"></a>
    <a href="faq" style="text-decoration:none;color:#39ff14" class="text-sm font-medium" id="MLF">FAQ</a>
  </div>
</header>

<!-- MAIN -->
<main class="pt-24 pb-20 px-4 sm:px-6 lg:px-8 max-w-4xl mx-auto">
  
  <!-- Header -->
  <div class="text-center mb-12">
    <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full text-xs font-bold mb-3" style="background:rgba(57,255,20,.1);border:1px solid rgba(57,255,20,.25);color:#39ff14">
      <span>❓ HELP & SUPPORT</span>
    </div>
    <h1 class="font-display text-3xl sm:text-5xl font-black text-white mb-4" id="PGTL">Questions Fréquentes</h1>
    <p class="text-sm sm:text-base max-w-xl mx-auto" style="color:rgba(224,224,224,.6)" id="PGST">
      Tout ce que vous devez savoir sur la commande, la livraison, la garantie et nos modes de paiement.
    </p>
  </div>

  <!-- FAQ Accordion Container -->
  <div id="FAQ_LIST" class="flex flex-col gap-4"></div>

  <!-- Contact Banner -->
  <div class="mt-12 p-6 rounded-2xl text-center" style="background:linear-gradient(145deg,#181818,#1f1f1f);border:1px solid #2A2A2A">
    <h3 class="font-display font-bold text-white text-lg mb-2" id="CTTL">Vous avez une autre question ?</h3>
    <p class="text-xs sm:text-sm mb-5" style="color:rgba(224,224,224,.6)" id="CTST">Notre équipe est disponible 24/7 sur WhatsApp pour vous aider.</p>
    <a href="https://wa.me/213562961410" target="_blank" class="BO" id="CTBTN">Contactez-nous sur WhatsApp</a>
  </div>

</main>

<script>
var FL={
  en:'<svg width="22" height="15" viewBox="0 0 22 15" style="border-radius:2px;display:block"><rect width="22" height="15" fill="#B22234"/><rect y="1.15" width="22" height="1.15" fill="#fff"/><rect y="3.46" width="22" height="1.15" fill="#fff"/><rect y="5.77" width="22" height="1.15" fill="#fff"/><rect y="8.08" width="22" height="1.15" fill="#fff"/><rect y="10.38" width="22" height="1.15" fill="#fff"/><rect y="12.69" width="22" height="1.15" fill="#fff"/><rect width="9" height="8.08" fill="#3C3B6E"/></svg>',
  fr:'<svg width="22" height="15" viewBox="0 0 22 15" style="border-radius:2px;display:block"><rect width="7.33" height="15" fill="#002395"/><rect x="7.33" width="7.34" height="15" fill="#fff"/><rect x="14.67" width="7.33" height="15" fill="#ED2939"/></svg>',
  ar:'<svg width="22" height="15" viewBox="0 0 640 480" style="border-radius:2px;display:block"><path fill="#fff" d="M0 0h640v480H0z"/><path fill="#006633" d="M0 0h320v480H0z"/><path fill="#d21034" d="M417.3 240a120 120 0 1 1-153.6-114.9 96 96 0 1 0 0 229.8A120 120 0 0 1 417.3 240z"/><polygon fill="#d21034" points="364.8,240 307.2,281.8 329.2,214.1 271.6,255.9 342.8,255.9"/></svg>'
};

var L = localStorage.getItem('strivio_lang') || 'fr';
var $ = function(id){ return document.getElementById(id); };

var TX = {
  fr:{ home:'Accueil', subs:'Abonnements', pageTitle:'Questions Fréquentes (FAQ)', pageSub:'Tout ce que vous devez savoir sur vos commandes et la garantie.', ctTitle:'Vous avez une autre question ?', ctSub:'Notre équipe est disponible 24/7 sur WhatsApp pour vous répondre.', ctBtn:'💬 Contacter le Support' },
  ar:{ home:'الرئيسية', subs:'الاشتراكات', pageTitle:'الأسئلة الشائعة (FAQ)', pageSub:'كل ما تحتاج معرفته عن الشراء، التسليم، الضمان وطرق الدفع.', ctTitle:'لديك استفسار آخر؟', ctSub:'فريق الدعم متاح على مدار الساعة عبر واتساب لمساعدتك.', ctBtn:'💬 تواصل مع الدعم الفني' },
  en:{ home:'Home', subs:'Subscriptions', pageTitle:'Frequently Asked Questions', pageSub:'Everything you need to know about ordering, delivery, warranty and payments.', ctTitle:'Have more questions?', ctSub:'Our team is available 24/7 on WhatsApp to help you.', ctBtn:'💬 Contact Support on WhatsApp' }
};

function render(){
  var tx = TX[L] || TX.fr;
  $('HR').dir = L === 'ar' ? 'rtl' : 'ltr';
  $('HR').lang = L;
  $('NLH').textContent = tx.home;
  $('NLS').textContent = tx.subs;
  $('MLH').textContent = tx.home;
  $('MLS').textContent = tx.subs;
  $('PGTL').textContent = tx.pageTitle;
  $('PGST').textContent = tx.pageSub;
  $('CTTL').textContent = tx.ctTitle;
  $('CTST').textContent = tx.ctSub;
  $('CTBTN').textContent = tx.ctBtn;

  if($('LCD')) $('LCD').textContent = L.toUpperCase();
  if($('FLD')) $('FLD').innerHTML = FL[L];
  if($('FLDM')) $('FLDM').innerHTML = FL[L];

  document.querySelectorAll('.FEN').forEach(function(el){ el.innerHTML = FL.en; });
  document.querySelectorAll('.FFR').forEach(function(el){ el.innerHTML = FL.fr; });
  document.querySelectorAll('.FAR').forEach(function(el){ el.innerHTML = FL.ar; });

  document.querySelectorAll('.LO').forEach(function(b){ b.classList.toggle('AC', b.dataset.l === L); });

  // Render FAQs
  var container = $('FAQ_LIST');
  if(!container) return;
  var faqs = window.FAQS;
  if (!faqs || faqs.length === 0) {
    var loadMsg = L === 'ar' ? '⏳ جاري جلب الأسئلة الشائعة من قاعدة البيانات...' : (L === 'en' ? '⏳ Loading FAQs from server...' : '⏳ Chargement des questions depuis le serveur...');
    container.innerHTML = '<div class="text-center py-16 text-gray-400 font-medium">' + loadMsg + '</div>';
    return;
  }
  container.innerHTML = faqs.map(function(item, index){
    var qObj = (typeof item.q === 'string') ? (function(){ try{return JSON.parse(item.q);}catch(e){return {};} })() : (item.q || {});
    var aObj = (typeof item.a === 'string') ? (function(){ try{return JSON.parse(item.a);}catch(e){return {};} })() : (item.a || {});
    var q = qObj[L] || qObj.ar || qObj.fr || qObj.en || (typeof item.q === 'string' ? item.q : '');
    var a = aObj[L] || aObj.ar || aObj.fr || aObj.en || (typeof item.a === 'string' ? item.a : '');
    return [
      '<div class="FAQ-ITEM" id="FAQ_'+index+'">',
        '<div class="FAQ-HEADER" onclick="toggleFaq('+index+')">',
          '<div class="flex items-center gap-3">',
            '<span class="text-xl">'+(item.icon||'❓')+'</span>',
            '<span class="font-display font-bold text-white text-base sm:text-lg">'+q+'</span>',
          '</div>',
          '<svg class="FAQ-ICON transition-transform duration-300 flex-shrink-0" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>',
        '</div>',
        '<div class="FAQ-BODY">',
          '<p>'+a+'</p>',
        '</div>',
      '</div>'
    ].join('');
  }).join('');
}

function toggleFaq(idx){
  var item = $('FAQ_' + idx);
  if(!item) return;
  var isOpen = item.classList.contains('OPEN');
  document.querySelectorAll('.FAQ-ITEM').forEach(function(el){ el.classList.remove('OPEN'); });
  if(!isOpen){ item.classList.add('OPEN'); }
}

// Mobile Menu & Lang Events
$('HB').addEventListener('click', function(){ $('MM').classList.toggle('O'); });

document.addEventListener('click', function(e){
  var lo = e.target.closest('.LO[data-l]');
  if(lo){
    L = lo.dataset.l;
    localStorage.setItem('strivio_lang', L);
    if($('LDPD')) $('LDPD').classList.remove('O');
    if($('LDPM')) $('LDPM').classList.remove('O');
    render();
    return;
  }
  if(e.target.closest('#LTD')){ if($('LDPD')) $('LDPD').classList.toggle('O'); return; }
  if(e.target.closest('#LTM')){ if($('LDPM')) $('LDPM').classList.toggle('O'); return; }
  if(!e.target.closest('#LDPD') && !e.target.closest('#LTD') && $('LDPD')) $('LDPD').classList.remove('O');
  if(!e.target.closest('#LDPM') && !e.target.closest('#LTM') && $('LDPM')) $('LDPM').classList.remove('O');
});

render();
if (typeof loadFaqsFromDB === 'function') {
  loadFaqsFromDB().then(function(dbFaqs) {
    if (dbFaqs && dbFaqs.length > 0) {
      window.FAQS = dbFaqs;
      if (typeof render === 'function') render();
    } else {
      var container = $('FAQ_LIST');
      if (container && (!window.FAQS || window.FAQS.length === 0)) {
        var errMsg = L === 'ar' ? '⚠️ لم يتم العثور على أسئلة شائعة في قاعدة البيانات (Supabase). تأكد من تشغيل كود SQL الخاص بجدول faq في لوحة Supabase.' : '⚠️ No FAQs found in Supabase database. Please run schema.sql in Supabase.';
        container.innerHTML = '<div class="text-center py-16 text-yellow-400 font-medium">' + errMsg + '</div>';
      }
    }
  });
}
</script>
</body>
</html>
