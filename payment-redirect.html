<!DOCTYPE html>
<html>
<head>
  <script src="clean-url.js"></script>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval';">
<title>Redirecting...</title>
<script>
(function(){
  var s = window.location.search.toLowerCase();
  var oid = '';
  var m = window.location.search.match(/[?&](?:order_id|id|invoice_id)=([^&]+)/i);
  if (m) oid = decodeURIComponent(m[1]);

  if (s.indexOf('error') !== -1 || s.indexOf('expired') !== -1 || s.indexOf('timeout') !== -1 || s.indexOf('cancelled') !== -1 || s.indexOf('cancel') !== -1 || s.indexOf('annul') !== -1 || s.indexOf('payment_cancelled') !== -1 || s.indexOf('status=cancelled') !== -1 || s.indexOf('status=failed') !== -1) {
    window.location.replace('cart?payment_cancelled=1&order_id=' + oid);
  } else {
    window.location.replace('thank-you?success=1&order_id=' + oid);
  }
})();
</script>
</head>
<body></body>
</html>
