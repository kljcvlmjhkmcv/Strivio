<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0a0a0a"><title>Strivio — My Account</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"><style>:root{--n:#39ff14}*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:#0b0b0b;color:#eee;min-height:100vh}.display{font-family:'Space Grotesk',Inter,sans-serif}.grid-bg{background-image:linear-gradient(rgba(57,255,20,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(57,255,20,.025) 1px,transparent 1px);background-size:48px 48px}.card{background:linear-gradient(145deg,rgba(25,25,25,.96),rgba(17,17,17,.96));border:1px solid rgba(255,255,255,.075);box-shadow:0 18px 60px rgba(0,0,0,.22)}.pill{background:rgba(57,255,20,.09);color:var(--n);border:1px solid rgba(57,255,20,.22)}.btn{background:var(--n);color:#080808;font-weight:900;border:0;border-radius:12px;padding:11px 16px;cursor:pointer;transition:.2s}.btn:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(57,255,20,.18)}.ghost{background:#141414;border:1px solid #303030;color:#ddd;border-radius:12px;padding:10px 15px;cursor:pointer;transition:.2s}.ghost:hover{border-color:#555}.secret{font-family:ui-monospace,monospace;background:#0c0c0c;border:1px solid #303030;border-radius:13px;padding:13px;word-break:break-all}.input{width:100%;background:#0e0e0e;border:1px solid #303030;border-radius:13px;padding:12px 14px;color:#fff;outline:none}.input:focus{border-color:var(--n)}.navbtn.active{color:#080808;background:var(--n);border-color:var(--n)}.lang{border:1px solid #303030;color:#888;border-radius:9px;padding:5px 8px;font-size:11px}.lang.active{color:#080808;background:var(--n);border-color:var(--n)}.order{transition:.22s}.order:hover{border-color:rgba(57,255,20,.25);transform:translateY(-2px)}@media(max-width:760px){.account-grid{display:block}.sidebar{position:static!important;margin-bottom:18px}}</style></head><body class="grid-bg"><header class="border-b border-white/5 bg-black/75 backdrop-blur-xl sticky top-0 z-30"><div class="max-w-6xl mx-auto px-4 h-16 flex justify-between items-center"><a href="./" class="display text-2xl font-black text-[#39ff14] no-underline">Strivio</a><div class="flex items-center gap-2"><div class="hidden sm:flex gap-1"><button class="lang" data-lang="ar">AR</button><button class="lang" data-lang="fr">FR</button><button class="lang" data-lang="en">EN</button></div><a href="cart.html" class="ghost text-xs" data-t="cart"></a><button onclick="logout()" class="ghost text-xs" data-t="logout"></button></div></div></header><main class="max-w-6xl mx-auto p-4 sm:p-6"><section class="card rounded-[26px] p-6 sm:p-8 mb-6 relative overflow-hidden"><div class="absolute -top-24 -left-20 w-64 h-64 rounded-full bg-[#39ff14]/10 blur-3xl"></div><div class="relative flex flex-col sm:flex-row justify-between gap-5 sm:items-center"><div><span class="pill rounded-full px-3 py-1 text-[11px] font-bold" data-t="secure"></span><p class="text-gray-500 text-sm mt-4" data-t="welcome"></p><h1 id="name" class="display text-3xl font-black mt-1">—</h1><p id="email" class="text-gray-500 mt-1"></p></div><div class="flex gap-2 sm:hidden"><button class="lang" data-lang="ar">AR</button><button class="lang" data-lang="fr">FR</button><button class="lang" data-lang="en">EN</button></div></div></section><div class="account-grid grid md:grid-cols-[220px_1fr] gap-6"><aside class="sidebar card rounded-2xl p-3 h-fit sticky top-24"><button onclick="tab('orders',this)" class="navbtn active ghost w-full text-start mb-2" data-t="orders"></button><button onclick="tab('profile',this)" class="navbtn ghost w-full text-start" data-t="profile"></button><div class="mt-5 p-3 rounded-xl bg-black/30 border border-white/5"><p class="text-xs text-gray-500 leading-5" data-t="help"></p><a href="https://wa.me/213562961410" class="text-[#39ff14] text-xs font-bold" data-t="support"></a></div></aside><section><div id="orders"><div class="mb-5"><h2 class="display text-2xl font-black" data-t="ordersTitle"></h2><p class="text-sm text-gray-500 mt-1" data-t="ordersSub"></p></div><div id="ordersList" class="space-y-4"><div class="card rounded-2xl p-14 text-center text-gray-500" data-t="loading"></div></div></div><div id="profile" class="hidden"><div class="mb-5"><h2 class="display text-2xl font-black" data-t="profileTitle"></h2><p class="text-sm text-gray-500 mt-1" data-t="profileSub"></p></div><div class="card rounded-3xl p-5 sm:p-7"><form id="profileForm" class="grid sm:grid-cols-2 gap-3"><input id="first" class="input" data-ph="first"><input id="last" class="input" data-ph="last"><input id="phone" class="input" data-ph="phone"><input id="wilaya" class="input" data-ph="wilaya"><label class="sm:col-span-2 flex gap-2 text-sm text-gray-400 p-3 rounded-xl bg-black/20"><input id="mEmail" type="checkbox" class="accent-[#39ff14]"><span data-t="emailOpt"></span></label><label class="sm:col-span-2 flex gap-2 text-sm text-gray-400 p-3 rounded-xl bg-black/20"><input id="mWa" type="checkbox" class="accent-[#39ff14]"><span data-t="waOpt"></span></label><button class="btn sm:col-span-2 mt-2" data-t="save"></button></form></div></div></section></div></main><script src="supabase-client.js"></script><script>
const T={ar:{cart:'السلة',logout:'خروج',secure:'حساب محمي',welcome:'مرحبًا بك',orders:'طلباتي',profile:'بياناتي',help:'تحتاج مساعدة في طلب أو تفعيل؟ فريقنا متاح عبر WhatsApp.',support:'التواصل مع الدعم',ordersTitle:'طلباتي',ordersSub:'تابع الدفع والتسليم، واكشف بيانات منتجاتك بأمان.',profileTitle:'بيانات الحساب',profileSub:'حدّث بيانات الاستلام وموافقات التواصل.',loading:'جاري تحميل طلباتك...',empty:'لا توجد طلبات بعد.',first:'الاسم',last:'اللقب',phone:'رقم الهاتف',wilaya:'الولاية',emailOpt:'أوافق على عروض البريد (اختياري ويمكن إلغاؤه)',waOpt:'أوافق على عروض WhatsApp (اختياري ويمكن إلغاؤه)',save:'حفظ التغييرات',saved:'تم حفظ بياناتك',saveFail:'تعذر حفظ البيانات',paid:'مدفوع',completed:'مكتمل',pending:'قيد الانتظار',pending_payment:'بانتظار الدفع',cancelled:'ملغي',show:'إظهار معلومات الطلب',download:'تحميل مستند الطلب',opening:'جاري الفتح...',deliveryWait:'التسليم قيد التحضير.',email:'البريد',password:'كلمة السر',screen:'الشاشة',pin:'رمز PIN',code:'الكود',activationTitle:'أدخل حسابك المطلوب تفعيله',activationEmail:'بريد حساب Spotify أو الخدمة',note:'ملاحظة اختيارية',sendActivation:'إرسال للتفعيل',activationSent:'تم الإرسال، وسنبدأ التفعيل.',openFail:'تعذر فتح التسليم. تأكد أنك داخل الحساب الذي أجرى الطلب.',docTitle:'مستند الطلب',amount:'المبلغ',private:'هذه المعلومات خاصة بصاحب الطلب.'},fr:{cart:'Panier',logout:'Déconnexion',secure:'Compte protégé',welcome:'Bienvenue',orders:'Mes commandes',profile:'Mes informations',help:'Besoin d’aide pour une commande ou une activation ? Notre équipe est disponible sur WhatsApp.',support:'Contacter le support',ordersTitle:'Mes commandes',ordersSub:'Suivez le paiement et la livraison, puis affichez vos produits en toute sécurité.',profileTitle:'Informations du compte',profileSub:'Mettez à jour la livraison et vos préférences de communication.',loading:'Chargement de vos commandes...',empty:'Aucune commande pour le moment.',first:'Prénom',last:'Nom',phone:'Téléphone',wilaya:'Wilaya',emailOpt:'J’accepte les offres par e-mail (facultatif)',waOpt:'J’accepte les offres WhatsApp (facultatif)',save:'Enregistrer',saved:'Informations enregistrées',saveFail:'Enregistrement impossible',paid:'Payée',completed:'Terminée',pending:'En attente',pending_payment:'Paiement en attente',cancelled:'Annulée',show:'Afficher les informations',download:'Télécharger le document',opening:'Ouverture...',deliveryWait:'Livraison en préparation.',email:'E-mail',password:'Mot de passe',screen:'Profil',pin:'Code PIN',code:'Code',activationTitle:'Saisissez le compte à activer',activationEmail:'E-mail Spotify ou du service',note:'Note facultative',sendActivation:'Envoyer pour activation',activationSent:'Envoyé. Nous allons commencer l’activation.',openFail:'Impossible d’ouvrir la livraison. Vérifiez que vous utilisez le compte de la commande.',docTitle:'Document de commande',amount:'Montant',private:'Ces informations sont réservées au propriétaire de la commande.'},en:{cart:'Cart',logout:'Sign out',secure:'Protected account',welcome:'Welcome',orders:'My orders',profile:'My details',help:'Need help with an order or activation? Our team is available on WhatsApp.',support:'Contact support',ordersTitle:'My orders',ordersSub:'Track payment and delivery, then reveal your products securely.',profileTitle:'Account details',profileSub:'Update delivery details and communication preferences.',loading:'Loading your orders...',empty:'No orders yet.',first:'First name',last:'Last name',phone:'Phone number',wilaya:'Wilaya',emailOpt:'I agree to email offers (optional)',waOpt:'I agree to WhatsApp offers (optional)',save:'Save changes',saved:'Details saved',saveFail:'Could not save details',paid:'Paid',completed:'Completed',pending:'Pending',pending_payment:'Awaiting payment',cancelled:'Cancelled',show:'Reveal order details',download:'Download document',opening:'Opening...',deliveryWait:'Delivery is being prepared.',email:'Email',password:'Password',screen:'Profile',pin:'PIN',code:'Code',activationTitle:'Enter the account to activate',activationEmail:'Spotify or service account email',note:'Optional note',sendActivation:'Send for activation',activationSent:'Sent. We will begin activation.',openFail:'Could not open delivery. Make sure you are using the account that placed the order.',docTitle:'Order document',amount:'Amount',private:'This information is private to the order owner.'}};
let user,profile,orders=[],lang=localStorage.getItem('strivio_lang')||'ar';const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const tx=()=>T[lang]||T.ar;function applyLang(l){lang=l;localStorage.setItem('strivio_lang',l);document.documentElement.lang=l;document.documentElement.dir=l==='ar'?'rtl':'ltr';document.querySelectorAll('[data-t]').forEach(x=>x.textContent=tx()[x.dataset.t]||'');document.querySelectorAll('[data-ph]').forEach(x=>x.placeholder=tx()[x.dataset.ph]||'');document.querySelectorAll('.lang').forEach(x=>x.classList.toggle('active',x.dataset.lang===l));renderOrders()}document.querySelectorAll('.lang').forEach(b=>b.onclick=()=>applyLang(b.dataset.lang));function tab(x,b){document.getElementById('orders').classList.toggle('hidden',x!=='orders');document.getElementById('profile').classList.toggle('hidden',x!=='profile');document.querySelectorAll('.navbtn').forEach(n=>n.classList.remove('active'));b.classList.add('active')}async function logout(){await window.supabaseClient.auth.signOut();location.href='./'}async function delivery(id){const{data:{session}}=await window.supabaseClient.auth.getSession();if(!session)throw new Error('Authentication required');const response=await fetch(SUPABASE_URL+'/functions/v1/customer-delivery',{method:'POST',headers:{'Authorization':'Bearer '+session.access_token,'apikey':SUPABASE_ANON_KEY,'Content-Type':'application/json','x-client-info':'strivio-account'},body:JSON.stringify({order_id:id})});const data=await response.json().catch(()=>null);if(!response.ok||!data?.success)throw new Error(data?.error||'Delivery failed');return data}function statusText(s){return tx()[s]||s}
async function reveal(id,btn){btn.disabled=true;btn.textContent=tx().opening;try{const d=await delivery(id);document.getElementById('delivery-'+id).innerHTML=renderDelivery(d.fulfillments);btn.remove()}catch(err){btn.disabled=false;btn.textContent=tx().show;alert(tx().openFail)}}function deliveryStatusMessage(f){if(f.status==='out_of_stock')return lang==='ar'?'المخزون غير كافٍ حالياً. تم إشعار الإدارة وسيتم التواصل معك سريعاً.':lang==='fr'?'Stock insuffisant pour le moment. L’équipe est prévenue et vous contactera rapidement.':'Stock is not available right now. The team has been notified and will contact you soon.';if(f.status==='failed')return lang==='ar'?'تعذر التسليم الآلي لهذا المنتج. فريق Strivio سيراجع الطلب ويتواصل معك.':lang==='fr'?'La livraison automatique a échoué. L’équipe Strivio va vérifier la commande et vous contacter.':'Automatic delivery failed. Strivio will review the order and contact you.';if(f.mode==='email_invite')return lang==='ar'?'تم الدفع. ستصلك الدعوة قريباً على البريد الإلكتروني المسجل في الطلب.':lang==='fr'?'Paiement confirmé. L’invitation sera envoyée bientôt à votre e-mail.':'Payment confirmed. The invitation will be sent to your email soon.';if(f.mode==='manual_delivery')return lang==='ar'?'تم الدفع. الطلب قيد التجهيز اليدوي وسيتم التواصل معك عبر الهاتف أو البريد.':lang==='fr'?'Paiement confirmé. La commande est en préparation manuelle et vous serez contacté.':'Payment confirmed. The order is being prepared manually and you will be contacted.';return f.delivery_summary?.message||tx().deliveryWait}function renderDelivery(fs){if(!fs.length)return'<p class="text-gray-400 mt-3">'+tx().deliveryWait+'</p>';return fs.map(f=>{if(f.delivery?.entries?.length)return`<div class="mt-4"><b class="text-[#39ff14]">${esc(f.delivery.product_name)}</b>${f.delivery.ends_at?`<p class="text-xs text-gray-500 mt-1">${lang==='ar'?'ينتهي الاشتراك':'Subscription ends'}: ${new Date(f.delivery.ends_at).toLocaleDateString(lang==='ar'?'ar-DZ':lang==='fr'?'fr-FR':'en-GB')}</p>`:''}${f.delivery.entries.map(x=>`<div class="secret mt-2 leading-7">${x.email?`${tx().email}: ${esc(x.email)}<br>${tx().password}: ${esc(x.password)}<br>${tx().screen}: ${esc(x.profile)}<br>${tx().pin}: ${esc(x.pin||'—')}`:`${tx().code}: ${esc(x.code)}`}</div>`).join('')}</div>`;if(f.mode==='manual_activation'&&f.status==='awaiting_customer')return`<form onsubmit="activate(event,'${f.id}')" class="mt-4 space-y-2"><b>${tx().activationTitle}</b><p class="text-sm text-gray-500">${esc(deliveryStatusMessage(f))}</p><input name="account_email" type="email" required class="input" placeholder="${tx().activationEmail}"><textarea name="note" class="input" placeholder="${tx().note}"></textarea><button class="btn">${tx().sendActivation}</button></form>`;return`<p class="mt-4 text-yellow-300">${esc(deliveryStatusMessage(f))}</p>`}).join('')}async function activate(ev,id){ev.preventDefault();const fd=new FormData(ev.target);const {data,error}=await window.supabaseClient.functions.invoke('submit-activation',{body:{fulfillment_id:id,account_email:fd.get('account_email'),account_note:fd.get('note')}});if(error||!data?.success)return alert(tx().saveFail);ev.target.innerHTML='<p class="text-[#39ff14]">'+tx().activationSent+'</p>'}
async function downloadDoc(id){const d=await delivery(id),body=renderDelivery(d.fulfillments),html=`<!doctype html><html lang="${lang}" dir="${lang==='ar'?'rtl':'ltr'}"><meta charset="utf-8"><title>Strivio</title><body style="font-family:Arial;padding:35px"><h1>Strivio — ${tx().docTitle}</h1><p>${esc(id)}</p><p>${tx().amount}: ${Number(d.order.total_payable).toLocaleString()} DZD</p>${body}<hr><small>${tx().private}</small></body></html>`,a=document.createElement('a');a.href=URL.createObjectURL(new Blob([html],{type:'text/html;charset=utf-8'}));a.download=`strivio-order-${id.slice(0,8)}.html`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function renderOrders(){const box=document.getElementById('ordersList');if(!box)return;if(!orders.length){box.innerHTML='<div class="card rounded-3xl p-14 text-center text-gray-500">'+tx().empty+'</div>';return}box.innerHTML=orders.map(o=>`<article class="order card rounded-3xl p-5 sm:p-6"><div class="flex flex-wrap justify-between gap-3"><div><span class="pill rounded-full px-3 py-1 text-xs font-bold">${esc(statusText(o.status))}</span><p class="text-xs text-gray-500 mt-3">${new Date(o.created_at).toLocaleString(lang==='ar'?'ar-DZ':lang==='fr'?'fr-FR':'en-GB')}</p><p class="font-mono text-[11px] text-gray-600 mt-1">${esc(o.id)}</p></div><b class="display text-[#39ff14] text-2xl">${Number(o.total_payable||0).toLocaleString()} DZD</b></div><p class="mt-5 text-sm text-gray-300">${(o.items||[]).map(i=>esc(i.nameData?.[lang]||i.nameData?.ar||i.name||i.id)+' ×'+(i.qty||1)).join(' • ')}</p>${['paid','completed'].includes(o.status)?`<div class="flex flex-wrap gap-2 mt-5"><button onclick="reveal('${o.id}',this)" class="btn">${tx().show}</button><button onclick="downloadDoc('${o.id}')" class="ghost">${tx().download}</button></div><div id="delivery-${o.id}"></div>`:''}</article>`).join('')}
document.getElementById('profileForm').addEventListener('submit',async ev=>{ev.preventDefault();const $=id=>document.getElementById(id),p={id:user.id,first_name:$('first').value.trim(),last_name:$('last').value.trim(),phone:$('phone').value.trim(),wilaya:$('wilaya').value.trim(),marketing_email_opt_in:$('mEmail').checked,marketing_whatsapp_opt_in:$('mWa').checked,consent_updated_at:new Date().toISOString(),updated_at:new Date().toISOString()};const {error}=await window.supabaseClient.from('profiles').upsert(p);alert(error?tx().saveFail:tx().saved)});async function init(){const {data:{session}}=await window.supabaseClient.auth.getSession();if(!session){location.href='auth.html?next=my-account.html';return}user=session.user;document.getElementById('email').textContent=user.email||'';const [{data:p},{data:o}]=await Promise.all([window.supabaseClient.from('profiles').select('*').eq('id',user.id).maybeSingle(),window.supabaseClient.from('orders').select('*').order('created_at',{ascending:false})]);profile=p||{};orders=o||[];document.getElementById('name').textContent=((profile.first_name||'')+' '+(profile.last_name||'')).trim()||user.email;['first','last','phone','wilaya'].forEach(id=>document.getElementById(id).value=profile[id==='first'?'first_name':id==='last'?'last_name':id]||'');document.getElementById('mEmail').checked=!!profile.marketing_email_opt_in;document.getElementById('mWa').checked=!!profile.marketing_whatsapp_opt_in;applyLang(lang);const oid=new URLSearchParams(location.search).get('order');if(oid)setTimeout(()=>{const b=Array.from(document.querySelectorAll('button')).find(x=>x.getAttribute('onclick')===`reveal('${oid}',this)`);if(b)b.click()},300)}applyLang(lang);init();
</script></body></html>
