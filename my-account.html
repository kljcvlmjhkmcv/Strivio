<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>حسابي — Strivio</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>body{font-family:Arial,sans-serif;background:#0d0d0d;color:#eee}.card{background:#181818;border:1px solid #2b2b2b}.pill{background:#39ff1420;color:#39ff14;border:1px solid #39ff1440}.btn{background:#39ff14;color:#080808;font-weight:800;border-radius:11px;padding:10px 16px}.ghost{border:1px solid #3a3a3a;border-radius:11px;padding:10px 16px}.secret{font-family:monospace;background:#0d0d0d;border:1px solid #333;border-radius:10px;padding:10px;word-break:break-all}</style></head><body><header class="border-b border-gray-800 bg-black/70 sticky top-0 z-20"><div class="max-w-5xl mx-auto p-4 flex justify-between items-center"><a href="./" class="text-2xl font-black text-[#39ff14]">Strivio</a><div class="flex gap-2"><a href="cart.html" class="ghost text-sm">السلة</a><button onclick="logout()" class="ghost text-sm">خروج</button></div></div></header><main class="max-w-5xl mx-auto p-4 sm:p-6"><section class="card rounded-3xl p-6 mb-6"><p class="text-gray-400 text-sm">مرحبًا</p><h1 id="name" class="text-2xl font-black mt-1">حسابي</h1><p id="email" class="text-gray-500 mt-1"></p></section><div class="flex gap-2 mb-5"><button onclick="tab('orders')" class="btn">طلباتي</button><button onclick="tab('profile')" class="ghost">بياناتي</button></div><section id="orders"><div id="ordersList" class="space-y-4"><div class="text-center text-gray-500 py-16">جاري تحميل طلباتك...</div></div></section><section id="profile" class="hidden card rounded-3xl p-6"><form id="profileForm" class="grid sm:grid-cols-2 gap-3"><input id="first" class="secret" placeholder="الاسم"><input id="last" class="secret" placeholder="اللقب"><input id="phone" class="secret" placeholder="رقم الهاتف"><input id="wilaya" class="secret" placeholder="الولاية"><label class="sm:col-span-2 text-sm"><input id="mEmail" type="checkbox"> أوافق على عروض البريد (اختياري ويمكن إلغاؤه)</label><label class="sm:col-span-2 text-sm"><input id="mWa" type="checkbox"> أوافق على عروض WhatsApp (اختياري ويمكن إلغاؤه)</label><button class="btn sm:col-span-2">حفظ</button></form></section></main><script src="supabase-client.js"></script><script>
let user,profile,orders=[];const e=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));function tab(x){document.getElementById('orders').classList.toggle('hidden',x!=='orders');document.getElementById('profile').classList.toggle('hidden',x!=='profile')}async function logout(){await window.supabaseClient.auth.signOut();location.href='./'}
async function delivery(id){const {data,error}=await window.supabaseClient.functions.invoke('customer-delivery',{body:{order_id:id}});if(error||!data?.success)throw error||new Error(data?.error);return data}
function statusText(s){return({paid:'مدفوع',completed:'مكتمل',pending:'قيد الانتظار',pending_payment:'بانتظار الدفع',cancelled:'ملغي'}[s]||s)}
async function reveal(id,btn){btn.disabled=true;btn.textContent='جاري الفتح...';try{const d=await delivery(id);document.getElementById('delivery-'+id).innerHTML=renderDelivery(d.fulfillments);btn.remove()}catch(err){btn.disabled=false;btn.textContent='إظهار معلومات الطلب';alert('تعذر فتح التسليم. تأكد أنك داخل نفس الحساب الذي أجرى الطلب.')}}
function renderDelivery(fs){if(!fs.length)return'<p class="text-gray-400">التسليم قيد التحضير.</p>';return fs.map(f=>{if(f.delivery?.entries?.length)return`<div class="mt-3"><b>${e(f.delivery.product_name)}</b>${f.delivery.entries.map(x=>`<div class="secret mt-2">${x.email?`البريد: ${e(x.email)}<br>كلمة السر: ${e(x.password)}<br>الشاشة: ${e(x.profile)}<br>PIN: ${e(x.pin||'بدون')}`:`الكود: ${e(x.code)}`}</div>`).join('')}</div>`;if(f.mode==='manual_activation'&&f.status==='awaiting_customer')return`<form onsubmit="activate(event,'${f.id}')" class="mt-3 space-y-2"><b>أدخل حسابك المطلوب تفعيله</b><input name="account_email" type="email" required class="secret w-full" placeholder="بريد حساب Spotify أو الخدمة"><textarea name="note" class="secret w-full" placeholder="ملاحظة اختيارية"></textarea><button class="btn">إرسال للتفعيل</button></form>`;return`<p class="mt-3 text-yellow-300">${e(f.delivery_summary?.message||'طلبك قيد المعالجة وسيصلك قريبًا.')}</p>`}).join('')}
async function activate(ev,id){ev.preventDefault();const fd=new FormData(ev.target);const {data,error}=await window.supabaseClient.functions.invoke('submit-activation',{body:{fulfillment_id:id,account_email:fd.get('account_email'),account_note:fd.get('note')}});if(error||!data?.success)return alert('تعذر إرسال المعلومات');ev.target.innerHTML='<p class="text-[#39ff14]">تم الإرسال، وسنبدأ التفعيل.</p>'}
async function downloadDoc(id){const d=await delivery(id);const body=renderDelivery(d.fulfillments);const html=`<!doctype html><html dir="rtl"><meta charset="utf-8"><title>طلب Strivio</title><body style="font-family:Arial;padding:35px"><h1>Strivio — مستند الطلب</h1><p>رقم الطلب: ${e(id)}</p><p>المبلغ: ${Number(d.order.total_payable).toLocaleString()} دج</p>${body}<hr><small>هذه المعلومات خاصة بصاحب الطلب.</small></body></html>`;const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([html],{type:'text/html;charset=utf-8'}));a.download=`strivio-order-${id.slice(0,8)}.html`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function renderOrders(){const box=document.getElementById('ordersList');if(!orders.length){box.innerHTML='<div class="card rounded-3xl p-12 text-center text-gray-500">لا توجد طلبات بعد.</div>';return}box.innerHTML=orders.map(o=>`<article class="card rounded-3xl p-5"><div class="flex flex-wrap justify-between gap-3"><div><span class="pill rounded-full px-3 py-1 text-xs">${e(statusText(o.status))}</span><p class="text-xs text-gray-500 mt-3">${new Date(o.created_at).toLocaleString('ar-DZ')}</p><p class="font-mono text-xs text-gray-500 mt-1">${e(o.id)}</p></div><b class="text-[#39ff14] text-xl">${Number(o.total_payable||0).toLocaleString()} دج</b></div><p class="mt-4">${(o.items||[]).map(i=>e(i.nameData?.ar||i.name||i.id)+' ×'+(i.qty||1)).join(' • ')}</p>${['paid','completed'].includes(o.status)?`<div class="flex flex-wrap gap-2 mt-4"><button onclick="reveal('${o.id}',this)" class="btn">إظهار معلومات الطلب</button><button onclick="downloadDoc('${o.id}')" class="ghost">تحميل المستند</button></div><div id="delivery-${o.id}"></div>`:''}</article>`).join('')}
document.getElementById('profileForm').addEventListener('submit',async ev=>{ev.preventDefault();const $=id=>document.getElementById(id);const p={id:user.id,first_name:$('first').value.trim(),last_name:$('last').value.trim(),phone:$('phone').value.trim(),wilaya:$('wilaya').value.trim(),marketing_email_opt_in:$('mEmail').checked,marketing_whatsapp_opt_in:$('mWa').checked,consent_updated_at:new Date().toISOString(),updated_at:new Date().toISOString()};const {error}=await window.supabaseClient.from('profiles').upsert(p);alert(error?'تعذر الحفظ':'تم حفظ بياناتك')});
async function init(){const {data:{session}}=await window.supabaseClient.auth.getSession();if(!session){location.href='auth.html?next=my-account.html';return}user=session.user;document.getElementById('email').textContent=user.email||'';const [{data:p},{data:o}]=await Promise.all([window.supabaseClient.from('profiles').select('*').eq('id',user.id).maybeSingle(),window.supabaseClient.from('orders').select('*').order('created_at',{ascending:false})]);profile=p||{};orders=o||[];document.getElementById('name').textContent=((profile.first_name||'')+' '+(profile.last_name||'')).trim()||'حسابي';document.getElementById('first').value=profile.first_name||'';document.getElementById('last').value=profile.last_name||'';document.getElementById('phone').value=profile.phone||'';document.getElementById('wilaya').value=profile.wilaya||'';document.getElementById('mEmail').checked=!!profile.marketing_email_opt_in;document.getElementById('mWa').checked=!!profile.marketing_whatsapp_opt_in;renderOrders();const q=new URLSearchParams(location.search),oid=q.get('order');if(oid)setTimeout(()=>{const buttons=Array.from(document.querySelectorAll('button'));const b=buttons.find(x=>x.getAttribute('onclick')===`reveal('${oid}',this)`);if(b)b.click()},300)}init();
</script></body></html>
