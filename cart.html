<style>
:root{--n:#39ff14;--nr:57,255,20}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-family:Inter,sans-serif;background:#121212;color:#E0E0E0;overflow-x:hidden !important;width:100%;max-width:100%}
body{background:#121212;overflow-x:hidden !important;width:100%;max-width:100%;position:relative}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#121212}::-webkit-scrollbar-thumb{background:var(--n);border-radius:99px}
.NT{color:var(--n);text-shadow:0 0 18px rgba(var(--nr),.5)}
.GN{background:rgba(18,18,18,.82);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);border-bottom:1px solid rgba(var(--nr),.08)}
.BO{border:1.5px solid var(--n);color:var(--n);font-weight:600;font-family:'Space Grotesk',sans-serif;border-radius:9999px;padding:.48rem 1.3rem;transition:all .2s;background:transparent;cursor:pointer;font-size:.875rem;text-decoration:none;display:inline-block}
.BO:hover{background:var(--n);color:#121212;box-shadow:0 0 20px rgba(var(--nr),.4)}
.BN{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;background:var(--n);color:#121212;font-weight:700;font-family:'Space Grotesk',sans-serif;border-radius:9999px;padding:.9rem 2.4rem;transition:all .25s ease;border:none;cursor:pointer;text-decoration:none;font-size:1rem;white-space:nowrap;width:100%}
.BN:hover{transform:scale(1.02);filter:brightness(1.08)}
.BN:active,.BO:active,.SOC-BTN:active{transform:scale(.96)}
.BN:disabled{opacity:.5;cursor:wait;transform:none;filter:none}
.BN:disabled::after{content:'';width:15px;height:15px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:CS .7s linear infinite}
.BDG{display:inline-flex;align-items:center;gap:.3rem;background:rgba(var(--nr),.1);border:1px solid rgba(var(--nr),.25);color:var(--n);font-size:.7rem;font-weight:700;border-radius:999px;padding:.22rem .75rem;letter-spacing:.07em;text-transform:uppercase}
.LO{display:flex;align-items:center;gap:.65rem;width:100%;padding:.6rem 1rem;font-size:.875rem;color:#E0E0E0;background:transparent;border:none;cursor:pointer;transition:all .15s;text-align:left;white-space:nowrap}
.LO:hover{background:rgba(var(--nr),.1);color:var(--n)}
.LO.AC{color:var(--n)}
#MM{display:none;flex-direction:column;gap:.75rem;padding:1.25rem 1.5rem;background:rgba(18,18,18,.97);border-top:1px solid rgba(var(--nr),.1)}
#MM.O{display:flex}
.HMB span{display:block;width:22px;height:2px;background:#E0E0E0;border-radius:2px;transition:all .3s}
.HMB.O span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.HMB.O span:nth-child(2){opacity:0}
.HMB.O span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
/* Cart Item & Icon Wrap */
.CI{background:#181818;border:1px solid #2A2A2A;border-radius:16px;padding:1rem 1.2rem;display:flex;align-items:center;gap:1rem;transition:all .3s;animation:FI .35s ease forwards}
.CI:hover{border-color:rgba(var(--nr),.22)}
.CI-ICON-WRAP{width:56px;height:56px;border-radius:14px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin:auto}
.CI-GIFT{display:flex;align-items:center;gap:.4rem;width:max-content;max-width:100%;margin-top:.55rem;padding:.3rem .65rem;border:1px solid rgba(var(--nr),.28);border-radius:999px;background:rgba(var(--nr),.075);color:#78ff62;font-size:.68rem;font-weight:800;line-height:1.35}
/* Payment Options */
.PM{background:#181818;border:1.5px solid #2A2A2A;border-radius:14px;padding:1rem 1.2rem;cursor:pointer;transition:all .22s;display:flex;align-items:center;gap:.85rem}
.PM:hover:not(.DIS){border-color:rgba(var(--nr),.4);background:rgba(var(--nr),.04)}
.PM.SEL{border-color:var(--n);background:rgba(var(--nr),.1);box-shadow:0 0 18px rgba(var(--nr),.12)}
.PM.DIS{opacity:.45;cursor:not-allowed}
.RB{width:18px;height:18px;border-radius:50%;border:2px solid #2A2A2A;flex-shrink:0;transition:all .2s;display:flex;align-items:center;justify-content:center}
.PM.SEL .RB{border-color:var(--n);background:var(--n)}
.PM.SEL .RB::after{content:'';width:6px;height:6px;background:#121212;border-radius:50%}
/* Summary box */
.SUM{background:#181818;border:1px solid #2A2A2A;border-radius:18px;padding:1.5rem}
/* Toast */
#TOAST{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(100px);background:#1A1A1A;border:1px solid rgba(var(--nr),.3);border-radius:14px;padding:1rem 1.5rem;max-width:380px;width:calc(100% - 2rem);z-index:9999;transition:transform .4s cubic-bezier(.23,1,.32,1),opacity .4s;opacity:0;display:flex;align-items:flex-start;gap:.75rem;box-shadow:0 8px 40px rgba(0,0,0,.7)}
#TOAST.SH{transform:translateX(-50%) translateY(0);opacity:1}
/* empty state */
.EMPT{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:1.2rem;text-align:center;padding:2rem}
@keyframes FI{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes P2{0%,100%{box-shadow:0 0 10px 2px rgba(var(--nr),.4)}50%{box-shadow:0 0 24px 6px rgba(var(--nr),.65)}}
@keyframes CS{to{transform:rotate(360deg)}}
[dir=rtl] .LO{text-align:right;flex-direction:row-reverse}
#LDPD.O,#LDPM.O{display:block}
#LDPD,#LDPM{box-shadow:0 8px 30px rgba(0,0,0,.5)}
.GBGR{background-image:linear-gradient(rgba(var(--nr),.03) 1px,transparent 1px),linear-gradient(90deg,rgba(var(--nr),.03) 1px,transparent 1px);background-size:48px 48px}
.SOC-BTN{display:flex;align-items:center;justify-content:center;gap:.5rem;border-radius:12px;padding:.75rem 1rem;font-weight:700;font-size:.875rem;transition:all .2s;text-decoration:none;border:none;cursor:pointer;width:100%}
.SOC-BTN:hover{filter:brightness(1.15);transform:translateY(-1px)}
@media(max-width:640px){
  .CI{padding:0.85rem;gap:0.75rem}
  .CI-ICON-WRAP{width:48px;height:48px}
  .SUM{padding:1.15rem}
}
</style>

function makeIcon(item, sz){
  sz = (sz || 48) + 'px';
  var rawSrc = String(item.iconSrc || '').trim();
  var iconValue = (!rawSrc || rawSrc.charAt(0) === '<' || rawSrc.indexOf('data:image') === 0)
    ? String(item.name || item.title || item.id || '?').slice(0,1).toUpperCase()
    : rawSrc;
  if(rawSrc.indexOf('<svg') === 0){
    var safeSvg = rawSrc
      .replace(/<script[\s\S]*?<\/script>/gi, '')
      .replace(/\son\w+\s*=\s*(["']).*?\1/gi, '');
    safeSvg = safeSvg.replace('<svg', '<svg aria-hidden="true" style="width:'+sz+';height:'+sz+';display:block"');
    return '<div style="width:'+sz+';height:'+sz+';display:flex;align-items:center;justify-content:center">'+safeSvg+'</div>';
  }
  if((item.iconType === 'img' || item.iconType === 'svg') && /^(https?:|data:image\/)/i.test(rawSrc)){
    var fallback = '<span style="display:none;width:'+sz+';height:'+sz+';align-items:center;justify-content:center;font-family:Space Grotesk,sans-serif;font-weight:900;font-size:'+Math.round(parseInt(sz)*0.55)+'px;color:#fff">'+escapeHtml(iconValue)+'</span>';
    return '<img src="'+escapeHtml(rawSrc)+'" style="width:'+sz+';height:'+sz+';object-fit:contain" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"/>'+fallback;
  }
  if(item.iconType === 'text' || !item.iconSrc){
    return '<div style="width:'+sz+';height:'+sz+';display:flex;align-items:center;justify-content:center;font-family:Space Grotesk,sans-serif;font-weight:900;font-size:'+Math.round(parseInt(sz)*0.55)+'px;color:'+(item.iconColor||'#fff')+'">'+escapeHtml(iconValue)+'</div>';
  }
  return '<div style="width:'+sz+';height:'+sz+'">'+iconValue+'</div>';
}

function cartBundlePreview(item, service){
  if(item && item.renewal)return null;
  var offers=service&&Array.isArray(service.bundle_offers)?service.bundle_offers:[];
  var offer=offers.find(function(value){return Number(value.source_duration_idx)===Number(item&&item.durIdx);});
  if(!offer)return null;
  return {
    service_id:offer.gift_service_id,
    nameData:offer.gift_name||{},
    label_i18n:offer.label_i18n||{},
    quantity:offer.gift_qty||1,
    display_only:true
  };
}

function cartBundleLabel(preview){
  var custom=preview&&preview.label_i18n&&preview.label_i18n[L];
  if(custom)return String(custom);
  var names=preview&&preview.nameData||{};
  var name=names[L]||names.fr||names.en||names.ar||'Prime Video';
  if(L==='ar')return 'هدية مشمولة: بروفايل '+name+' مجاناً لنفس المدة';
  if(L==='en')return 'Included gift: 1 '+name+' profile for the same period';
  return 'Cadeau inclus : 1 profil '+name+' pour la même durée';
}

              '<span class="text-xs font-bold text-white px-1">'+q+'</span>',
            isRenewal ? '' :
              '<button type="button" onclick="changeQty('+idx+', 1)" class="w-5 h-5 flex items-center justify-center text-white font-bold text-xs hover:text-[#39ff14]">+</button>',
            isRenewal ? '' : '</div>',
            '<div class="font-display font-bold text-sm" style="color:var(--n)">'+fmtP(itemTotal)+'</div>',
          '</div>',
        '</div>',
        '<button onclick="removeItem('+idx+')" class="flex items-center justify-center w-8 h-8 rounded-lg transition-all flex-shrink-0" style="background:#2A2A2A;border:none;cursor:pointer;color:rgba(224,224,224,.5)" onmouseover="this.style.background=\'rgba(255,50,50,.2)\';this.style.color=\'#ff5555\'" onmouseout="this.style.background=\'#2A2A2A\';this.style.color=\'rgba(224,224,224,.5)\'" title="'+tx.remove+'">',
          '<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>',
        '</button>',
      '</div>'
    ].join('');
  }).join('');
}

function changeQty(idx, delta){
  if(!cart[idx]) return;
  if(cart[idx].renewal) return;
  var previousQty = Number(cart[idx].qty || 1);
  if(!Number(cart[idx].unitPrice)) cart[idx].unitPrice = Number(cart[idx].price || 0) / previousQty;
  var q = previousQty + delta;
  if(q < 1) q = 1;
  if(q > 20) q = 20;
  cart[idx].qty = q;
  cart[idx].price = Number(cart[idx].unitPrice || 0) * q;
  localStorage.setItem('strivio_cart', JSON.stringify(cart));
  render();
}

function normalizedCartItems(){
  return cart.map(function(item){
    var q = parseInt(item.qty || item.quantity || 1, 10);
    if(!Number.isFinite(q) || q < 1) q = 1;
    if(q > 20) q = 20;
    var unit = Number(item.unitPrice || 0);
    if(!unit){
      var rawPrice = Number(item.price || 0);
      unit = rawPrice && q ? rawPrice / q : 0;
    }
    return Object.assign({}, item, {
      qty: q,
      quantity: q,
      unitPrice: unit,
      price: unit * q
    });
  });
}

   RENDER SUMMARY
════════════════════════════════════════════════════════ */
function renderSummary(){
  var tx = t();
  var sub = cart.reduce(function(s,i){ var q=Number(i.qty||1),u=Number(i.unitPrice||0)||Number(i.price||0)/q; return s + u*q; }, 0);
  var disc = appliedCoupon ? (couponDiscount || 0) : 0;
  var subAfterDisc = Math.max(0, sub - disc);
  var flexyFee = Math.round(subAfterDisc * 0.19);
  var total = subAfterDisc + (selPay === 'flexy' ? flexyFee : 0);

  // Item rows
  var rowsEl = $('SMROWS');
  if(rowsEl){
    rowsEl.innerHTML = cart.map(function(item){
      var svc = (window.SERVICES || []).find(function(s){ return s.id === item.id; }) || {};
      var itemName = (item.nameData && item.nameData[L]) ? item.nameData[L] : (item.name || item.title || (svc.n && svc.n[L]) || item.id || 'Product');
      var durLabel = (item.durLabelData && item.durLabelData[L]) ? item.durLabelData[L] : (item.durLabel || (tx.dl && tx.dl[item.durIdx||0]) || '1 Month');
      var q = item.qty || 1;
      var itemTotal = (item.unitPrice || item.price) * q;
      return '<div class="flex items-center justify-between text-sm"><span style="color:rgba(224,224,224,.6);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px">'+escapeHtml(itemName)+' x'+q+'</span><span class="font-medium text-white ml-2 flex-shrink-0">'+fmtP(itemTotal)+'</span></div>';
    }).join('');
  }

  // Discount row
  var discRow = $('DISCROW');
  if(discRow){
    if(disc > 0){
      discRow.style.display = 'flex';
      setT('DISCLBL', tx.discount + ' (' + appliedCoupon + ')');
      setT('DISCAMT', '-' + fmtP(disc));
    } else {
      discRow.style.display = 'none';
    }
  }

  // Flexy row (19%)
  var flxRow = $('FLXROW');
  if(flxRow){
    if(selPay === 'flexy'){
      flxRow.style.display = 'flex';
      setT('FLXLBL', tx.flexyFee);
      setT('FLXAMT', '+' + fmtP(flexyFee));
    } else {
      flxRow.style.display = 'none';
    }
  }

  // Wise row
  var wiseRow = $('WISEROW');
  if(wiseRow){
    if(selPay === 'wise'){
      wiseRow.style.display = 'flex';
      setT('WISELBL', L==='ar' ? 'سعر الصرف (Wise)' : L==='fr' ? 'Taux Wise (1€ = '+wiseRate()+' DZD)' : 'Wise Rate (1€ = '+wiseRate()+' DZD)');
      setT('WISEAMT', (total / wiseRate()).toFixed(2) + ' €');
    } else {
      wiseRow.style.display = 'none';
    }
  }

  // USDT row
  var usdtRow = $('USDTROW');
  if(usdtRow){
    if(selPay === 'usdt'){
      usdtRow.style.display = 'flex';
      setT('USDTLBL', L==='ar' ? 'سعر الصرف (USDT)' : L==='fr' ? 'Taux USDT (1$ = '+usdtRate()+' DZD)' : 'USDT Rate (1$ = '+usdtRate()+' DZD)');
      setT('USDTAMT', (total / usdtRate()).toFixed(2) + ' USDT');
    } else {
      usdtRow.style.display = 'none';
    }
  }

  setT('TTTLBL', tx.total);
  if(selPay === 'wise'){
    var eur = (total / wiseRate()).toFixed(2);
    setT('TTAMT', eur + ' € (~' + fmtP(total) + ')');
  } else if(selPay === 'usdt'){
    var usdt = (total / usdtRate()).toFixed(2);
    setT('TTAMT', usdt + ' USDT (~' + fmtP(total) + ')');
  } else {
    setT('TTAMT', fmtP(total));
  }
}

$('CPN_BTN').addEventListener('click', async function(){
  if(this.dataset.busy==='1') return;

  var tx = t();
  var val = ($('CPN_INP').value || '').trim().toUpperCase();

  if(!val){
    appliedCoupon = null;
    couponDiscount = 0;
    msg.classList.add('hidden');
    renderSummary();
    this.dataset.busy='0';this.disabled=false;
    return;
  }
  try { if (typeof validateCouponInDB === 'function') {
    var sub = cart.reduce(function(s,i){ var q=Number(i.qty||1),u=Number(i.unitPrice||0)||Number(i.price||0)/q; return s + u*q; }, 0);
    var res = await validateCouponInDB(val, sub);
    if (res && res.valid) {
      appliedCoupon = val;

      msg.textContent = res ? res.message : tx.cpnErr;
      msg.className = 'text-xs mt-1.5 font-semibold text-[#ff5555] block';

    couponDiscount = 0;
    msg.textContent = tx.cpnErr;
    msg.className = 'text-xs mt-1.5 font-semibold text-[#ff5555] block';
  }} finally {

});

function removeItem(idx){
  var removed = cart[idx];
  cart.splice(idx, 1);
  if (removed && removed.renewal && cart.length === 0) {
    try {
      var savedCart = JSON.parse(localStorage.getItem('strivio_saved_cart_before_renewal') || '[]');
      if (Array.isArray(savedCart) && savedCart.length) cart = savedCart;
      localStorage.removeItem('strivio_saved_cart_before_renewal');
    } catch (_) {
      localStorage.removeItem('strivio_saved_cart_before_renewal');
    }
  }
  localStorage.setItem('strivio_cart', JSON.stringify(cart));
  render();
}

/* ══════════════════════════════════════════════════════
   BUILD ORDER MESSAGE FROM VERIFIED SERVER RESULTS
════════════════════════════════════════════════════════ */
function buildMessage(rpcData){
  var tx = t();
  var payLabel = '';
  tx.payMethods.forEach(function(p){ if(p.id===selPay) payLabel = p.label; });
  var lines = ['🛒 *New Order — Strivio*', ''];
  if(rpcData && rpcData.order_id) lines.push('🔖 *Order ID:* ' + rpcData.order_id);
  cart.forEach(function(item, i){
    var itemName = item.nameData ? (item.nameData[L] || item.name) : item.name;
    var dur = item.durLabelData ? (item.durLabelData[L] || item.durLabel) : item.durLabel;
    var typeLabel = item.typeLabelData && item.typeLabelData[L] ? item.typeLabelData[L][item.typeIdx||0] : (item.typeLabel || 'Standard');
    var q = item.qty || 1;
    var itemTotal = (item.unitPrice || item.price) * q;
    lines.push((i+1)+'. *'+itemName+'*');
    lines.push('   • Duration: '+dur);
    lines.push('   • Type/Tier: '+typeLabel);
    lines.push('   • Quantity: x'+q);
    lines.push('   • Price: '+fmtP(itemTotal));
  });
  var sub = rpcData.subtotal;
  var disc = rpcData.discount || 0;
  var flexyFee = rpcData.flexy_fee || 0;
  var total = rpcData.total_payable;

  lines.push('');
  lines.push('Subtotal: '+fmtP(sub));
  if(disc > 0){
    lines.push('Promo Discount ('+(appliedCoupon||'Coupon')+'): -'+fmtP(disc));
  }
  if(selPay === 'flexy' && flexyFee > 0){
    lines.push('Flexy fee (19%): +' + fmtP(flexyFee));
  }
  if(selPay === 'wise'){
    var eur = (total / wiseRate()).toFixed(2);
    lines.push('💰 *Total Payable: ' + eur + ' EUR (~' + fmtP(total) + ')*');
    lines.push('💱 Rate applied: 1 EUR = '+wiseRate()+' DZD');
  } else if(selPay === 'usdt'){
    var usdt = (total / usdtRate()).toFixed(2);
    lines.push('💰 *Total Payable: ' + usdt + ' USDT (~' + fmtP(total) + ')*');
    lines.push('💱 Rate applied: 1 USDT = '+usdtRate()+' DZD');
  } else {
    lines.push('💰 *Total Payable: ' + fmtP(total) + '*');
  }
  lines.push('💳 Payment Method: ' + payLabel);
  lines.push('');
  lines.push('Please confirm my order and send payment details. Thank you! 🙏');
  return lines.join('\n');
}

async function confirmOrder(){
  if(!selPay || cart.length === 0) return;
  var customerInfo = await getCustomerInfo();
  if (!customerInfo) return;
  var tx = t();
  var btn = $('CFRMBTN');
  var loadTxt = L === 'ar' ? '⏳ جاري إنشاء فاتورة الدفع الآمنة...' : (L === 'fr' ? '⏳ Création de la facture sécurisée...' : '⏳ Creating secure invoice...');
  if(btn) { btn.disabled = true; btn.textContent = loadTxt; }

  var rpcData = null;
  if (typeof saveOrderToDB === 'function') {
    rpcData = await saveOrderToDB({
      items: normalizedCartItems(),
      payment_method: selPay,
      coupon_code: appliedCoupon || null,
      customer_info: customerInfo
    });
  }

  if(btn) { 
    btn.disabled = false; 
    if (selPay === 'cib') {
      btn.textContent = L === 'ar' ? '💳 الانتقال للدفع الفوري الآمن (SATIM)' : (L === 'fr' ? '💳 Payer instantanément via SATIM' : '💳 Pay Instant & Secure via SATIM');
    } else {
      btn.textContent = tx.confirmBtn; 
    }
  }

  if (!rpcData || !rpcData.success) {
    var errMsg = rpcData && rpcData.error_message ? rpcData.error_message : (L === 'ar' ? 'حدث خطأ أثناء إنشاء الطلب في السيرفر. يرجى المحاولة مرة أخرى.' : (L === 'en' ? 'An error occurred while creating the order on the server. Please try again.' : 'Erreur lors de la création de la commande. Veuillez réessayer.'));
    showAppNotice(errMsg, { tone: 'error' });
    return;
  }

  if (selPay === 'test' && rpcData.simulated_paid) {
    localStorage.removeItem('strivio_cart');
    localStorage.removeItem('strivio_pending_cart');
    localStorage.setItem('strivio_pending_order_id', String(rpcData.order_id || ''));
    window.location.href = 'thank-you?test=1&order_id=' + encodeURIComponent(rpcData.order_id);
    return;
  }

  if (selPay === 'cib' && rpcData.payment_url) {
    localStorage.setItem('strivio_pending_cart', JSON.stringify(normalizedCartItems()));
    localStorage.setItem('strivio_pending_order_id', String(rpcData.order_id || ''));
    localStorage.removeItem("strivio_cart");
    window.location.href = rpcData.payment_url;
    return;
  }

  if (selPay === 'cib' && !rpcData.payment_url) {
    if (rpcData.error_message) {
      console.error("SlickPay / create-payment failure details:", rpcData.error_message);
    }
    showAppNotice(L === 'ar' ? '⚠️ تعذر الاتصال ببوابة الدفع الإلكتروني حالياً. سيتم توجيهك إلى واتساب لإتمام الدفع مباشرة مع الدعم الفني.' : (L === 'fr' ? '⚠️ Impossible de contacter la passerelle de paiement. Redirection vers WhatsApp...' : '⚠️ Could not reach payment gateway. Redirecting to WhatsApp...'), { tone: 'error' });
  }

  var msg = buildMessage(rpcData);
  var waUrl = 'https://wa.me/'+(CONFIG.whatsapp||'213562961410')+'?text='+encodeURIComponent(msg);

  copyToClipboard(msg);
  window.open(waUrl, '_blank');
  showToast(tx.toastTitle, tx.toastDesc);
}

function copyToClipboard(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).catch(function(){});
  } else {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch(e){}
    document.body.removeChild(ta);
  }
}

  var {data:p} = await window.supabaseClient.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
  if(!p) return;
  $('C_FIRST').value=p.first_name||''; $('C_LAST').value=p.last_name||''; $('C_PHONE').value=p.phone||'';
  $('C_M_EMAIL').checked=!!p.marketing_email_opt_in; $('C_M_WA').checked=!!p.marketing_whatsapp_opt_in;
}

async function enableAdminTestPayment(){
  if(!window.supabaseClient) return;
  var sessionResult=await window.supabaseClient.auth.getSession();
  var session=sessionResult.data&&sessionResult.data.session;
  if(!session) return;
  var membership=await window.supabaseClient.from('admin_users').select('user_id').eq('user_id',session.user.id).maybeSingle();
  if(membership.error||!membership.data) return;
  var labels={
    ar:{label:'🧪 دفع تجريبي مجاني — أدمن',desc:'يعتبر الطلب مدفوعاً ويستهلك المخزون الحقيقي'},
    fr:{label:'🧪 Paiement test gratuit — Admin',desc:'Commande payée et stock réel consommé'},
    en:{label:'🧪 Free Test Payment — Admin',desc:'Marks paid and consumes real inventory'}
  };
  Object.keys(TX).forEach(function(lang){
    if(!TX[lang].payMethods.some(function(p){return p.id==='test';})) TX[lang].payMethods.unshift({id:'test',label:labels[lang].label,desc:labels[lang].desc,icon:'🧪',disabled:false});
  });
  renderPayMethods();
  updateConfirmBtn();
}

/* ══════════════════════════════════════════════════════
   MASTER RENDER
════════════════════════════════════════════════════════ */
function render(){
  var tx = t();
  var hasItems = cart.length > 0;
  var crtEl = $('CRT'), emEl = $('EMST');
  if(crtEl) crtEl.style.display = hasItems ? '' : 'none';
  if(emEl) emEl.style.display = hasItems ? 'none' : 'flex';

  if(hasItems){
    renderItems();
    renderSummary();
    renderPayMethods();
    updateConfirmBtn();
    setT('SMTL', tx.summaryTitle);
    setT('PMTL', tx.payTitle);
    setT('TERMS', tx.terms);
    setT('WATIP_T', tx.waTitle);
    setT('WATIP_D', tx.waDesc);
    setT('CPNLBL', tx.cpnLabel);
    setT('CPN_BTN', tx.cpnBtn);
    setT('ORCONT', tx.orCont);
  } else {
    setT('EMTL', tx.emptyTitle);
    setT('EMST2', tx.emptyDesc);
    setT('EMBTN', tx.emptyBtn);
  }

  // Cart badge
  var desktopBadge = $('CNBD'), mobileBadge = $('CNBM');
  [desktopBadge, mobileBadge].forEach(function(badge){
    if(!badge) return;
    badge.textContent = cart.length;
    badge.style.display = cart.length > 0 ? 'inline-flex' : 'none';
  });
  // Breadcrumb
  setT('BCH', tx.breadHome);
  setT('BCCR', tx.breadCart);
  setT('PGTL', tx.pageTitle);
  // Nav
  setT('NLH', tx.home); setT('NLS', tx.subs);
  setT('MLH', tx.home); setT('MLS', tx.subs);
  setT('NTB', tx.trackOrder); setT('MTB', tx.trackOrder);
}

/* ══════════════════════════════════════════════════════
   APPLY LANGUAGE
════════════════════════════════════════════════════════ */
function applyLang(l){
  L = l;
  localStorage.setItem('strivio_lang', l);
  var hr = $('HR');
  hr.setAttribute('lang', l);
  hr.setAttribute('dir', l === 'ar' ? 'rtl' : 'ltr');
  $('FLD').innerHTML = FL[l];
  setT('LCD', l.toUpperCase());
  $('FLDM').innerHTML = FL[l];
  setT('LCDM', l.toUpperCase());
  document.querySelectorAll('.LO').forEach(function(b){ b.classList.toggle('AC', b.dataset.l === l); });
  if($('CPN_INP')) $('CPN_INP').placeholder = TX[l].cpnHolder || '';
  applyCustomerLanguage();
  render();
}

/* ══════════════════════════════════════════════════════
   EVENTS
════════════════════════════════════════════════════════ */
document.addEventListener('click', function(e){
  var lo = e.target.closest('.LO[data-l]');
  if(lo){ applyLang(lo.dataset.l); $('LDPD').classList.remove('O'); $('LDPM').classList.remove('O'); return; }
  if(e.target.closest('#LTD')){ $('LDPD').classList.toggle('O'); return; }
  if(e.target.closest('#LTM')){ $('LDPM').classList.toggle('O'); return; }
  if(!e.target.closest('#LDPD') && !e.target.closest('#LTD')) $('LDPD').classList.remove('O');
  if(!e.target.closest('#LDPM') && !e.target.closest('#LTM')) $('LDPM').classList.remove('O');
});

var hb = $('HB'), mm = $('MM');
hb.addEventListener('click', function(){ hb.classList.toggle('O'); mm.classList.toggle('O'); });

$('CFRMBTN').addEventListener('click', confirmOrder);

window.addEventListener('scroll', function(){ $('NAV').style.boxShadow = window.scrollY > 40 ? '0 2px 30px rgba(0,0,0,.7)' : 'none'; });

/* ══════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════ */
document.querySelectorAll('.FEN').forEach(function(el){ el.innerHTML = FL.en; });
document.querySelectorAll('.FFR').forEach(function(el){ el.innerHTML = FL.fr; });
document.querySelectorAll('.FAR').forEach(function(el){ el.innerHTML = FL.ar; });

// Load cart from localStorage
cart = JSON.parse(localStorage.getItem('strivio_cart') || '[]');
var cartReturnParams = new URLSearchParams(window.location.search);
var returningFromCancelledPayment = cartReturnParams.has('payment_cancelled') || cartReturnParams.has('cancelled');
if (cart.length === 0 && !returningFromCancelledPayment) {
  try {
    var savedCartAfterRenewal = JSON.parse(localStorage.getItem('strivio_saved_cart_before_renewal') || '[]');
    if (Array.isArray(savedCartAfterRenewal) && savedCartAfterRenewal.length) {
      cart = savedCartAfterRenewal;
      localStorage.setItem('strivio_cart', JSON.stringify(cart));
    }
    localStorage.removeItem('strivio_saved_cart_before_renewal');
  } catch (_) {
    localStorage.removeItem('strivio_saved_cart_before_renewal');
  }
}
applyLang(L);
prefillCustomer();
enableAdminTestPayment();
(async function refreshCartServices(){
  if(typeof loadServicesFromDB !== 'function') return;
  var services = await loadServicesFromDB();
  if(!Array.isArray(services) || !services.length) return;
  window.SERVICES = services;
  render();
})();

// Check if returned from cancelled payment
(async function checkCancelledPayment() {
  var params = new URLSearchParams(window.location.search);
  if (params.get('payment_cancelled') || params.get('cancelled')) {
    showToast(
      L === 'ar' ? '⚠️ تم إلغاء عملية الدفع' : (L === 'fr' ? '⚠️ Paiement annulé' : '⚠️ Payment cancelled'),
      L === 'ar' ? 'لم يتم خصم أي مبلغ. يمكنك المحاولة مرة أخرى أو اختيار طريقة دفع أخرى.' : (L === 'fr' ? 'Aucun montant n\'a été débité. Vous pouvez réessayer.' : 'No funds were charged. You can try again.')
    );
    var orderId = params.get('order_id') || '---';
    var pendingOrderId = localStorage.getItem('strivio_pending_order_id') || '';
    try {
      var pendingBackup = JSON.parse(localStorage.getItem('strivio_pending_cart') || '[]');
      if (cart.length === 0 && Array.isArray(pendingBackup) && pendingBackup.length > 0 && (!pendingOrderId || pendingOrderId === orderId)) {
        cart = pendingBackup;
        localStorage.setItem('strivio_cart', JSON.stringify(cart));
        if (typeof render === 'function') render();
      }
    } catch (_) {}
    var bannerContainer = document.getElementById('CANCEL_BANNER_CONTAINER');
    if (bannerContainer) {
      var titleText = L === 'ar' ? 'تم إلغاء أو عدم اكتمال عملية الدفع الفوري (SATIM) ⚠️' : (L === 'fr' ? 'Paiement SATIM annulé ou non finalisé ⚠️' : 'SATIM Payment Cancelled or Unfinished ⚠️');
      var descText = L === 'ar'
        ? `لم يتم خصم أي مبلغ مالي من بطاقتك أو حسابك. لقد قمنا بإرجاع منتجاتك إلى السلة بأمان (ولم يتم حذف طلبك رقم <span class="font-mono font-bold text-brand-neon">${orderId}</span>)، حيث يمكنك إعادة محاولة الدفع الفوري بالبطاقة الذهبية الآن أو اختيار طريقة دفع أخرى بسهولة.`
        : (L === 'fr'
          ? `Aucun montant n'a été débité. Vos articles ont été remis dans le panier (commande <span class="font-mono font-bold text-brand-neon">${orderId}</span> conservée). Vous pouvez réessayer le paiement SATIM ou choisir une autre méthode.`
          : `No charges were made. Your items are restored to your cart (order <span class="font-mono font-bold text-brand-neon">${orderId}</span> kept safe). You can try SATIM payment again or pick another method.`);
      bannerContainer.innerHTML = `
        <div style="background: rgba(239, 68, 68, 0.12); border: 1px solid rgba(239, 68, 68, 0.45); border-radius: 18px; padding: 20px 24px; display: flex; align-items: flex-start; gap: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.4), 0 0 20px rgba(239, 68, 68, 0.15); animation: popIn 0.5s ease;">
          <div style="font-size: 32px; flex-shrink: 0; line-height: 1;">⚠️</div>
          <div>
            <div style="font-weight: 800; font-size: 16px; color: #f87171; margin-bottom: 6px;">${titleText}</div>
            <div style="font-size: 14px; color: #e5e7eb; line-height: 1.6;">${descText}</div>
          </div>
        </div>
      `;
    }

    if (orderId && orderId !== '---' && window.supabaseClient) {
      try {
        await window.supabaseClient.functions.invoke('verify-payment', {
          body: { order_id: orderId, action: 'cancel' }
        });

        var { data: fullData } = await window.supabaseClient.from('orders').select('*').or('id.eq.' + orderId + ',payment_id.eq.' + orderId).single();
        if (fullData) {
          if (cart.length === 0 && fullData.items && Array.isArray(fullData.items) && fullData.items.length > 0) {
            cart = fullData.items;
            localStorage.setItem('strivio_cart', JSON.stringify(cart));
            applyLang(L);
            if (typeof render === 'function') render();
          }
          localStorage.removeItem('strivio_pending_cart');
          localStorage.removeItem('strivio_pending_order_id');
        }
      } catch(e) {
        console.error('Error handling cancelled order redirect:', e);
      }
    }
  }
})();
