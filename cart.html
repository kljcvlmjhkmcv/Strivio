<!DOCTYPE html>
<html lang="en" dir="ltr" id="HR" class="scroll-smooth">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval'; img-src 'self' https: data: blob:; connect-src 'self' https: wss:;"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Strivio — Cart & Checkout</title>
<meta name="description" content="Review your cart and complete your order on Strivio."/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet"/>
<script>tailwind.config={theme:{extend:{colors:{brand:{black:'#121212',neon:'#39ff14',card:'#181818',border:'#2A2A2A'}},fontFamily:{sans:['Inter','sans-serif'],display:['Space Grotesk','sans-serif']}}}}</script>
<style>
:root{--n:#39ff14;--nr:57,255,20}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-family:Inter,sans-serif;background:#121212;color:#E0E0E0;overflow-x:hidden !important;width:100%;max-width:100%}
body{background:#121212;overflow-x:hidden !important;width:100%;max-width:100%;position:relative}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#121212}::-webkit-scrollbar-thumb{background:var(--n);border-radius:99px}
.NT{color:var(--n);text-shadow:0 0 18px rgba(var(--nr),.5)}
.GN{background:rgba(18,18,18,.82);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);border-bottom:1px solid rgba(var(--nr),.08)}
.BO{border:1.5px solid var(--n);color:var(--n);font-weight:600;font-family:'Space Grotesk',sans-serif;border-radius:9999px;padding:.48rem 1.3rem;transition:all .2s;background:transparent;cursor:pointer;font-size:.875rem;text-decoration:none;display:inline-block}
.BO:hover{background:var(--n);color:#121212;box-shadow:0 0 20px rgba(var(--nr),.4)}
.BN{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;background:var(--n);color:#121212;font-weight:700;font-family:'Space Grotesk',sans-serif;border-radius:9999px;padding:.9rem 2.4rem;transition:all .25s ease;border:none;cursor:pointer;text-decoration:none;font-size:1rem;white-space:nowrap;width:100%}
.BN:hover{transform:scale(1.02);filter:brightness(1.08)}
.BN:disabled{opacity:.5;cursor:not-allowed;transform:none;filter:none}
.BDG{display:inline-flex;align-items:center;gap:.3rem;background:rgba(var(--nr),.1);border:1px solid rgba(var(--nr),.25);color:var(--n);font-size:.7rem;font-weight:700;border-radius:999px;padding:.22rem .75rem;letter-spacing:.07em;text-transform:uppercase}
.LO{display:flex;align-items:center;gap:.65rem;width:100%;padding:.6rem 1rem;font-size:.875rem;color:#E0E0E0;background:transparent;border:none;cursor:pointer;transition:all .15s;text-align:left;white-space:nowrap}
.LO:hover{background:rgba(var(--nr),.1);color:var(--n)}
.LO.AC{color:var(--n)}
#MM{display:none;flex-direction:column;gap:.75rem;padding:1.25rem 1.5rem;background:rgba(18,18,18,.97);border-top:1px solid rgba(var(--nr),.1)}
#MM.O{display:flex}
.HMB span{display:block;width:22px;height:2px;background:#E0E0E0;border-radius:2px;transition:all .3s}
.HMB.O span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.HMB.O span:nth-child(2){opacity:0}
.HMB.O span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
/* Cart Item & Icon Wrap */
.CI{background:#181818;border:1px solid #2A2A2A;border-radius:16px;padding:1rem 1.2rem;display:flex;align-items:center;gap:1rem;transition:all .3s;animation:FI .35s ease forwards}
.CI:hover{border-color:rgba(var(--nr),.22)}
.CI-ICON-WRAP{width:56px;height:56px;border-radius:14px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin:auto}
/* Payment Options */
.PM{background:#181818;border:1.5px solid #2A2A2A;border-radius:14px;padding:1rem 1.2rem;cursor:pointer;transition:all .22s;display:flex;align-items:center;gap:.85rem}
.PM:hover:not(.DIS){border-color:rgba(var(--nr),.4);background:rgba(var(--nr),.04)}
.PM.SEL{border-color:var(--n);background:rgba(var(--nr),.1);box-shadow:0 0 18px rgba(var(--nr),.12)}
.PM.DIS{opacity:.45;cursor:not-allowed}
.RB{width:18px;height:18px;border-radius:50%;border:2px solid #2A2A2A;flex-shrink:0;transition:all .2s;display:flex;align-items:center;justify-content:center}
.PM.SEL .RB{border-color:var(--n);background:var(--n)}
.PM.SEL .RB::after{content:'';width:6px;height:6px;background:#121212;border-radius:50%}
/* Summary box */
.SUM{background:#181818;border:1px solid #2A2A2A;border-radius:18px;padding:1.5rem}
/* Toast */
#TOAST{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(100px);background:#1A1A1A;border:1px solid rgba(var(--nr),.3);border-radius:14px;padding:1rem 1.5rem;max-width:380px;width:calc(100% - 2rem);z-index:9999;transition:transform .4s cubic-bezier(.23,1,.32,1),opacity .4s;opacity:0;display:flex;align-items:flex-start;gap:.75rem;box-shadow:0 8px 40px rgba(0,0,0,.7)}
#TOAST.SH{transform:translateX(-50%) translateY(0);opacity:1}
/* empty state */
.EMPT{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:1.2rem;text-align:center;padding:2rem}
@keyframes FI{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes P2{0%,100%{box-shadow:0 0 10px 2px rgba(var(--nr),.4)}50%{box-shadow:0 0 24px 6px rgba(var(--nr),.65)}}
[dir=rtl] .LO{text-align:right;flex-direction:row-reverse}
#LDPD.O,#LDPM.O{display:block}
#LDPD,#LDPM{box-shadow:0 8px 30px rgba(0,0,0,.5)}
.GBGR{background-image:linear-gradient(rgba(var(--nr),.03) 1px,transparent 1px),linear-gradient(90deg,rgba(var(--nr),.03) 1px,transparent 1px);background-size:48px 48px}
.SOC-BTN{display:flex;align-items:center;justify-content:center;gap:.5rem;border-radius:12px;padding:.75rem 1rem;font-weight:700;font-size:.875rem;transition:all .2s;text-decoration:none;border:none;cursor:pointer;width:100%}
.SOC-BTN:hover{filter:brightness(1.15);transform:translateY(-1px)}
@media(max-width:640px){
  .CI{padding:0.85rem;gap:0.75rem}
  .CI-ICON-WRAP{width:48px;height:48px}
  .SUM{padding:1.15rem}
}
</style>
<script>
(function(){
  if(window.location.pathname.endsWith('.html')){
    window.history.replaceState(null,'',window.location.pathname.replace(/\.html$/,'')+window.location.search+window.location.hash);
  }
})();
</script>

</head>
<body class="overflow-x-hidden" style="background:#121212">

<!-- NAV -->
<header id="NAV" class="GN fixed top-0 left-0 right-0 z-50 transition-shadow duration-300">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16">
    <a href="./" class="NT font-display font-bold text-2xl select-none" style="text-decoration:none">Strivio</a>
    <nav class="hidden lg:flex items-center gap-7">
      <a href="./" class="text-sm font-medium hover:text-white transition-colors" style="color:rgba(224,224,224,.75);text-decoration:none" id="NLH"></a>
      <a href="./#subs" class="text-sm font-medium hover:text-white transition-colors" style="color:rgba(224,224,224,.75);text-decoration:none" id="NLS"></a>
      <a href="faq" class="text-sm font-medium hover:text-white transition-colors" style="color:rgba(224,224,224,.75);text-decoration:none" id="NLF">FAQ</a>
    </nav>
    <div class="hidden lg:flex items-center gap-3">
      <div class="relative">
        <button id="LTD" class="flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg border transition-all" style="border-color:#2A2A2A;background:#1A1A1A">
          <span id="FLD"></span><span id="LCD" class="font-bold text-white text-xs"></span>
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="rgba(224,224,224,.5)" stroke-width="2.5" stroke-linecap="round"><path d="m6 9 6 6 6-6"/></svg>
        </button>
        <div id="LDPD" class="absolute right-0 top-full mt-2 hidden rounded-xl overflow-hidden z-50" style="background:#1A1A1A;border:1px solid #2A2A2A;min-width:140px">
          <button class="LO" data-l="en"><span class="FEN"></span><span>English</span></button>
          <button class="LO" data-l="fr"><span class="FFR"></span><span>Français</span></button>
          <button class="LO" data-l="ar"><span class="FAR"></span><span>العربية</span></button>
        </div>
      </div>
      <!-- Cart badge -->
      <a href="cart" class="relative flex items-center gap-2 px-3 py-2 rounded-xl" style="border:1.5px solid rgba(var(--nr),.4);background:rgba(var(--nr),.08);text-decoration:none;color:var(--n)">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 2 3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span id="CNBD" class="text-xs font-bold" style="font-family:'Space Grotesk',sans-serif">0</span>
      </a>
      <a href="./" class="BO" id="NTB"></a>
    </div>
    <div class="flex lg:hidden items-center gap-2">
      <div class="relative">
        <button id="LTM" class="flex items-center gap-1 px-2 py-1.5 rounded-lg border" style="border-color:#2A2A2A;background:#1A1A1A">
          <span id="FLDM"></span>
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="rgba(224,224,224,.5)" stroke-width="2.5" stroke-linecap="round"><path d="m6 9 6 6 6-6"/></svg>
        </button>
        <div id="LDPM" class="absolute right-0 top-full mt-2 hidden rounded-xl overflow-hidden z-50" style="background:#1A1A1A;border:1px solid #2A2A2A;min-width:140px">
          <button class="LO" data-l="en"><span class="FEN"></span><span>English</span></button>
          <button class="LO" data-l="fr"><span class="FFR"></span><span>Français</span></button>
          <button class="LO" data-l="ar"><span class="FAR"></span><span>العربية</span></button>
        </div>
      </div>
      <button id="HB" class="HMB flex flex-col gap-[5px] cursor-pointer p-1"><span></span><span></span><span></span></button>
    </div>
  </div>
  <div id="MM">
    <a href="./" style="text-decoration:none;color:#E0E0E0" class="text-sm font-medium" id="MLH"></a>
    <a href="./#subs" style="text-decoration:none;color:#E0E0E0" class="text-sm font-medium" id="MLS"></a>
    <a href="faq" style="text-decoration:none;color:#E0E0E0" class="text-sm font-medium" id="MLF">FAQ</a>
    <a href="./" class="BO self-start" id="MTB"></a>
  </div>
</header>

<!-- TOAST -->
<div id="TOAST">
  <div style="color:var(--n);flex-shrink:0;margin-top:2px">
    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
  </div>
  <div>
    <div class="font-display font-bold text-white text-sm mb-1" id="TTTL"></div>
    <div class="text-xs leading-relaxed" style="color:rgba(224,224,224,.65)" id="TTXT"></div>
  </div>
</div>

<!-- MAIN -->
<main class="pt-24 pb-20 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto">

  <!-- Breadcrumb -->
  <div class="flex items-center gap-2 text-sm mb-8" style="color:rgba(224,224,224,.45)">
    <a href="./" style="text-decoration:none;color:rgba(224,224,224,.45)" onmouseover="this.style.color='#39ff14'" onmouseout="this.style.color='rgba(224,224,224,.45)'" id="BCH"></a>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
    <span style="color:#E0E0E0" id="BCCR"></span>
  </div>

  <!-- Page Header -->
  <div class="mb-10">
    <h1 class="font-display text-3xl sm:text-4xl font-black text-white mb-2" id="PGTL"></h1>
    <div style="width:48px;height:3px;background:var(--n);border-radius:99px;box-shadow:0 0 10px rgba(var(--nr),.4)"></div>
  </div>

  <!-- Empty State (hidden by default) -->
  <div id="EMST" class="EMPT" style="display:none">
    <div style="width:80px;height:80px;border-radius:50%;background:rgba(var(--nr),.08);border:1px solid rgba(var(--nr),.15);display:flex;align-items:center;justify-content:center">
      <svg width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="#39ff14" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 2 3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
    </div>
    <div class="font-display font-bold text-white text-xl" id="EMTL"></div>
    <p style="color:rgba(224,224,224,.5);max-width:300px" id="EMST2"></p>
    <a href="./#subs" class="BN" style="max-width:220px;animation:P2 3s ease-in-out infinite" id="EMBTN"></a>
  </div>

  <!-- Banner Container for Cancelled Payments -->
  <div id="CANCEL_BANNER_CONTAINER" class="mb-6"></div>

  <!-- Cart Content (shown when items exist) -->
  <div id="CRT" class="grid grid-cols-1 lg:grid-cols-3 gap-8">

    <!-- Items List -->
    <div class="lg:col-span-2">
      <div id="CITEMS" class="flex flex-col gap-4"></div>

      <!-- WhatsApp tip banner -->
      <div class="mt-6 flex items-start gap-3 p-4 rounded-2xl" style="background:rgba(37,211,102,.06);border:1px solid rgba(37,211,102,.2)">
        <div style="flex-shrink:0;margin-top:2px;color:#25D366">
          <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        </div>
        <div>
          <div class="font-display font-semibold text-sm mb-0.5" style="color:#25D366" id="WATIP_T"></div>
          <div class="text-xs leading-relaxed" style="color:rgba(224,224,224,.6)" id="WATIP_D"></div>
        </div>
      </div>
    </div>

    <!-- Order Summary -->
    <div class="lg:col-span-1">
      <div class="SUM sticky top-24">
        <h2 class="font-display font-bold text-white text-lg mb-5" id="SMTL"></h2>

        <!-- Coupon Input -->
        <div class="mb-5">
          <label class="block text-xs font-semibold mb-2" style="color:rgba(224,224,224,.7)" id="CPNLBL"></label>
          <div class="flex gap-2">
            <input id="CPN_INP" type="text" placeholder="STRIVIO10" class="flex-1 bg-[#1A1A1A] border border-[#2A2A2A] rounded-xl px-3 py-2 text-sm text-white uppercase outline-none focus:border-[#39ff14] transition-colors" />
            <button id="CPN_BTN" type="button" class="BO px-4 py-2 text-xs font-bold whitespace-nowrap"></button>
          </div>
          <div id="CPN_MSG" class="text-xs mt-1.5 font-medium hidden"></div>
        </div>

        <div style="height:1px;background:linear-gradient(90deg,transparent,#2A2A2A,transparent);margin-bottom:1rem"></div>

        <!-- Subtotal rows -->
        <div id="SMROWS" class="flex flex-col gap-2 mb-4"></div>

        <!-- Discount row -->
        <div id="DISCROW" style="display:none" class="flex items-center justify-between mb-2 text-sm">
          <span style="color:#39ff14" id="DISCLBL"></span>
          <span style="color:#39ff14;font-weight:700" id="DISCAMT"></span>
        </div>

        <!-- Flexy fee row (19%) -->
        <div id="FLXROW" style="display:none" class="flex items-center justify-between mb-2 text-sm">
          <span style="color:#ffa94d" id="FLXLBL"></span>
          <span style="color:#ffa94d;font-weight:700" id="FLXAMT"></span>
        </div>

        <!-- Wise rate row -->
        <div id="WISEROW" style="display:none" class="flex items-center justify-between mb-2 text-sm">
          <span style="color:#00b9ff" id="WISELBL"></span>
          <span style="color:#00b9ff;font-weight:700" id="WISEAMT"></span>
        </div>

        <!-- USDT rate row -->
        <div id="USDTROW" style="display:none" class="flex items-center justify-between mb-2 text-sm">
          <span style="color:#26a17b" id="USDTLBL"></span>
          <span style="color:#26a17b;font-weight:700" id="USDTAMT"></span>
        </div>

        <div style="height:1px;background:linear-gradient(90deg,transparent,#2A2A2A,transparent);margin-bottom:1rem"></div>

        <!-- Customer details: required for secure delivery and invoices -->
        <div id="CUSTOMER_BOX" class="mb-6 p-4 rounded-2xl" style="background:#121212;border:1px solid #2A2A2A">
          <div class="flex items-center justify-between gap-2 mb-3">
            <h3 id="C_INFO_TITLE" class="font-display font-bold text-white text-sm">معلومات الاستلام</h3>
            <a id="C_ACCOUNT_LINK" href="my-account.html" class="text-xs" style="color:#39ff14">حسابي</a>
          </div>
          <div class="grid grid-cols-2 gap-2">
            <input id="C_FIRST" class="bg-[#181818] border border-[#333] rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#39ff14]" maxlength="80">
            <input id="C_LAST" class="bg-[#181818] border border-[#333] rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#39ff14]" maxlength="80">
            <input id="C_EMAIL" type="email" class="col-span-2 bg-[#181818] border border-[#333] rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#39ff14]" maxlength="254">
            <input id="C_PHONE" type="tel" class="col-span-2 bg-[#181818] border border-[#333] rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#39ff14]" maxlength="24">
            <input id="C_WILAYA" class="col-span-2 bg-[#181818] border border-[#333] rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#39ff14]" maxlength="80">
          </div>
          <label class="flex items-start gap-2 mt-3 text-[11px] text-gray-400"><input id="C_M_EMAIL" type="checkbox" class="mt-0.5 accent-[#39ff14]"><span id="C_EMAIL_OPT"></span></label>
          <label class="flex items-start gap-2 mt-2 text-[11px] text-gray-400"><input id="C_M_WA" type="checkbox" class="mt-0.5 accent-[#39ff14]"><span id="C_WA_OPT"></span></label>
          <p id="CUSTOMER_ERR" class="hidden text-xs text-red-400 mt-3"></p>
        </div>

        <!-- Total -->
        <div class="flex items-center justify-between mb-6">
          <span class="font-display font-bold text-white" id="TTTLBL"></span>
          <span class="font-display font-black text-2xl NT" id="TTAMT"></span>
        </div>

        <!-- Payment Methods -->
        <h3 class="font-display font-semibold text-white text-sm mb-3" id="PMTL"></h3>
        <div class="flex flex-col gap-2.5 mb-6" id="PMLIST"></div>

        <!-- Confirm button (WhatsApp) -->
        <button class="BN mb-4" id="CFRMBTN" disabled style="animation:P2 3s ease-in-out infinite"></button>

        <!-- Social Ordering Options (Facebook / Instagram) -->
        <div class="pt-3" style="border-top:1px dashed #2A2A2A">
          <div class="text-xs text-center mb-3 font-medium" style="color:rgba(224,224,224,.5)" id="ORCONT"></div>

function makeIcon(item, sz){
  sz = (sz || 48) + 'px';
  if(item.iconType === 'img'){
    return '<img src="'+item.iconSrc+'" style="width:'+sz+';height:'+sz+';object-fit:contain" alt=""/>';
  }
  if(item.iconType === 'text'){
    return '<div style="width:'+sz+';height:'+sz+';display:flex;align-items:center;justify-content:center;font-family:Space Grotesk,sans-serif;font-weight:900;font-size:'+Math.round(parseInt(sz)*0.55)+'px;color:'+(item.iconColor||'#fff')+'">'+item.iconSrc+'</div>';
  }
  return '<div style="width:'+sz+';height:'+sz+'">'+item.iconSrc+'</div>';
}

/* ══════════════════════════════════════════════════════
   RENDER CART ITEMS
════════════════════════════════════════════════════════ */
function renderItems(){
  var tx = t();
  var el = $('CITEMS');
  if(!el) return;
  if(cart.length === 0){
    el.innerHTML = '';
    return;
  }
  el.innerHTML = cart.map(function(item, idx){
    var svc = (window.SERVICES || []).find(function(s){ return s.id === item.id; }) || {};
    var itemName = (item.nameData && item.nameData[L]) ? item.nameData[L] : (item.name || item.title || (svc.n && svc.n[L]) || item.id || 'Product');
    var durLabel = (item.durLabelData && item.durLabelData[L]) ? item.durLabelData[L] : (item.durLabel || (tx.dl && tx.dl[item.durIdx||0]) || '1 Month');
    var typeLabel = (item.typeLabelData && item.typeLabelData[L]) ? item.typeLabelData[L][item.typeIdx||0] : (item.typeLabel || '');
    if (!item.bg) item.bg = svc.bg || '#1a1a1a';
    if (!item.iconSrc && svc.iconSrc) item.iconSrc = svc.iconSrc;
    if (!item.iconType && svc.iconType) item.iconType = svc.iconType;
    var q = item.qty || 1;
    var itemTotal = (item.unitPrice || item.price) * q;
    
    return [
      '<div class="CI" id="CI'+idx+'">',
        '<div class="CI-ICON-WRAP" style="background:'+item.bg+'">',
          makeIcon(item, 44),
        '</div>',
        '<div style="flex:1;min-width:0">',
          '<div class="font-display font-bold text-white text-base leading-tight">'+escapeHtml(itemName)+'</div>',
          '<div class="text-xs mt-0.5 font-medium" style="color:rgba(224,224,224,.55)">'+escapeHtml(durLabel)+(typeLabel ? ' • <span style="color:#39ff14">'+escapeHtml(typeLabel)+'</span>' : '')+'</div>',
          '<div class="flex items-center gap-3 mt-2.5">',
            '<div class="flex items-center gap-1.5 px-2 py-0.5 rounded-lg bg-[#121212] border border-[#2A2A2A]">',
              '<button type="button" onclick="changeQty('+idx+', -1)" class="w-5 h-5 flex items-center justify-center text-white font-bold text-xs hover:text-[#39ff14]">-</button>',
              '<span class="text-xs font-bold text-white px-1">'+q+'</span>',
              '<button type="button" onclick="changeQty('+idx+', 1)" class="w-5 h-5 flex items-center justify-center text-white font-bold text-xs hover:text-[#39ff14]">+</button>',
            '</div>',
            '<div class="font-display font-bold text-sm" style="color:var(--n)">'+fmtP(itemTotal)+'</div>',
          '</div>',
        '</div>',
        '<button onclick="removeItem('+idx+')" class="flex items-center justify-center w-8 h-8 rounded-lg transition-all flex-shrink-0" style="background:#2A2A2A;border:none;cursor:pointer;color:rgba(224,224,224,.5)" onmouseover="this.style.background=\'rgba(255,50,50,.2)\';this.style.color=\'#ff5555\'" onmouseout="this.style.background=\'#2A2A2A\';this.style.color=\'rgba(224,224,224,.5)\'" title="'+tx.remove+'">',
          '<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>',
        '</button>',
      '</div>'
    ].join('');
  }).join('');
}

function changeQty(idx, delta){
  if(!cart[idx]) return;
  var q = (cart[idx].qty || 1) + delta;
  if(q < 1) q = 1;
  if(q > 20) q = 20;
  cart[idx].qty = q;
  cart[idx].price = (cart[idx].unitPrice || cart[idx].price) * q;
  localStorage.setItem('strivio_cart', JSON.stringify(cart));
  render();
}

/* ══════════════════════════════════════════════════════
   RENDER SUMMARY
════════════════════════════════════════════════════════ */
function renderSummary(){
  var tx = t();
  var sub = cart.reduce(function(s,i){ return s + (i.price || (i.unitPrice * (i.qty||1))); }, 0);
  var disc = appliedCoupon ? (couponDiscount || 0) : 0;
  var subAfterDisc = Math.max(0, sub - disc);
  var flexyFee = Math.round(subAfterDisc * 0.19);
  var total = subAfterDisc + (selPay === 'flexy' ? flexyFee : 0);

  // Item rows
  var rowsEl = $('SMROWS');
  if(rowsEl){
    rowsEl.innerHTML = cart.map(function(item){
      var svc = (window.SERVICES || []).find(function(s){ return s.id === item.id; }) || {};
      var itemName = (item.nameData && item.nameData[L]) ? item.nameData[L] : (item.name || item.title || (svc.n && svc.n[L]) || item.id || 'Product');
      var durLabel = (item.durLabelData && item.durLabelData[L]) ? item.durLabelData[L] : (item.durLabel || (tx.dl && tx.dl[item.durIdx||0]) || '1 Month');
      var q = item.qty || 1;
      var itemTotal = (item.unitPrice || item.price) * q;
      return '<div class="flex items-center justify-between text-sm"><span style="color:rgba(224,224,224,.6);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px">'+escapeHtml(itemName)+' x'+q+'</span><span class="font-medium text-white ml-2 flex-shrink-0">'+fmtP(itemTotal)+'</span></div>';
    }).join('');
  }

  // Discount row
  var discRow = $('DISCROW');
  if(discRow){
    if(disc > 0){
      discRow.style.display = 'flex';
      setT('DISCLBL', tx.discount + ' (' + appliedCoupon + ')');
      setT('DISCAMT', '-' + fmtP(disc));
    } else {
      discRow.style.display = 'none';
    }
  }

  // Flexy row (19%)
  var flxRow = $('FLXROW');
  if(flxRow){
    if(selPay === 'flexy'){
      flxRow.style.display = 'flex';
      setT('FLXLBL', tx.flexyFee);
      setT('FLXAMT', '+' + fmtP(flexyFee));
    } else {
      flxRow.style.display = 'none';
    }
  }

  // Wise row
  var wiseRow = $('WISEROW');
  if(wiseRow){
    if(selPay === 'wise'){
      wiseRow.style.display = 'flex';
      setT('WISELBL', L==='ar' ? 'سعر الصرف (Wise)' : L==='fr' ? 'Taux Wise (1€ = 260 DZD)' : 'Wise Rate (1€ = 260 DZD)');
      setT('WISEAMT', (total / 260).toFixed(2) + ' €');
    } else {
      wiseRow.style.display = 'none';
    }
  }

  // USDT row
  var usdtRow = $('USDTROW');
  if(usdtRow){
    if(selPay === 'usdt'){
      usdtRow.style.display = 'flex';
      setT('USDTLBL', L==='ar' ? 'سعر الصرف (USDT)' : L==='fr' ? 'Taux USDT (1$ = 250 DZD)' : 'USDT Rate (1$ = 250 DZD)');
      setT('USDTAMT', (total / 250).toFixed(2) + ' USDT');
    } else {
      usdtRow.style.display = 'none';
    }
  }

  setT('TTTLBL', tx.total);

/* ══════════════════════════════════════════════════════
   BUILD ORDER MESSAGE FROM VERIFIED SERVER RESULTS
════════════════════════════════════════════════════════ */
function buildMessage(rpcData){
  var tx = t();
  var payLabel = '';
  tx.payMethods.forEach(function(p){ if(p.id===selPay) payLabel = p.label; });
  var lines = ['🛒 *New Order — Strivio*', ''];
  if(rpcData && rpcData.order_id) lines.push('🔖 *Order ID:* ' + rpcData.order_id);
  cart.forEach(function(item, i){
    var itemName = item.nameData ? (item.nameData[L] || item.name) : item.name;
    var dur = item.durLabelData ? (item.durLabelData[L] || item.durLabel) : item.durLabel;
    var typeLabel = item.typeLabelData && item.typeLabelData[L] ? item.typeLabelData[L][item.typeIdx||0] : (item.typeLabel || 'Standard');
    var q = item.qty || 1;
    var itemTotal = (item.unitPrice || item.price) * q;
    lines.push((i+1)+'. *'+itemName+'*');
    lines.push('   • Duration: '+dur);
    lines.push('   • Type/Tier: '+typeLabel);
    lines.push('   • Quantity: x'+q);
    lines.push('   • Price: '+fmtP(itemTotal));
  });
  var sub = rpcData.subtotal;
  var disc = rpcData.discount || 0;
  var flexyFee = rpcData.flexy_fee || 0;
  var total = rpcData.total_payable;

  lines.push('');
  lines.push('Subtotal: '+fmtP(sub));
  if(disc > 0){
    lines.push('Promo Discount ('+(appliedCoupon||'Coupon')+'): -'+fmtP(disc));
  }
  if(selPay === 'flexy' && flexyFee > 0){
    lines.push('Flexy fee (19%): +' + fmtP(flexyFee));
  }
  if(selPay === 'wise'){
    var eur = (total / 260).toFixed(2);
    lines.push('💰 *Total Payable: ' + eur + ' EUR (~' + fmtP(total) + ')*');
    lines.push('💱 Rate applied: 1 EUR = 260 DZD');
  } else if(selPay === 'usdt'){
    var usdt = (total / 250).toFixed(2);
    lines.push('💰 *Total Payable: ' + usdt + ' USDT (~' + fmtP(total) + ')*');
    lines.push('💱 Rate applied: 1 USDT = 250 DZD');
  } else {
    lines.push('💰 *Total Payable: ' + fmtP(total) + '*');
  }
  lines.push('💳 Payment Method: ' + payLabel);
  lines.push('');
  lines.push('Please confirm my order and send payment details. Thank you! 🙏');
  return lines.join('\n');
}

async function confirmOrder(){
  if(!selPay || cart.length === 0) return;
  var customerInfo = await getCustomerInfo();
  if (!customerInfo) return;
  var tx = t();
  var btn = $('CFRMBTN');
  var loadTxt = L === 'ar' ? '⏳ جاري إنشاء فاتورة الدفع الآمنة...' : (L === 'fr' ? '⏳ Création de la facture sécurisée...' : '⏳ Creating secure invoice...');
  if(btn) { btn.disabled = true; btn.textContent = loadTxt; }

  var rpcData = null;
  if (typeof saveOrderToDB === 'function') {
    rpcData = await saveOrderToDB({
      items: cart,
      payment_method: selPay,
      coupon_code: appliedCoupon || null,
      customer_info: customerInfo
    });
  }

  if(btn) { 
    btn.disabled = false; 
    if (selPay === 'cib') {
      btn.textContent = L === 'ar' ? '💳 الانتقال للدفع الفوري الآمن (SATIM)' : (L === 'fr' ? '💳 Payer instantanément via SATIM' : '💳 Pay Instant & Secure via SATIM');
    } else {
      btn.textContent = tx.confirmBtn; 
    }
  }

  if (!rpcData || !rpcData.success) {
    var errMsg = L === 'ar' ? 'حدث خطأ أثناء إنشاء الطلب في السيرفر. يرجى المحاولة مرة أخرى.' : (L === 'en' ? 'An error occurred while creating the order on the server. Please try again.' : 'Erreur lors de la création de la commande. Veuillez réessayer.');
    alert(errMsg);
    return;
  }

  if (selPay === 'cib' && rpcData.payment_url) {
    localStorage.setItem('strivio_pending_cart', JSON.stringify(cart));
    localStorage.setItem('strivio_pending_order_id', String(rpcData.order_id || ''));
    localStorage.removeItem("strivio_cart");
    window.location.href = rpcData.payment_url;
    return;
  }

  if (selPay === 'cib' && !rpcData.payment_url) {
    if (rpcData.error_message) {
      console.error("SlickPay / create-payment failure details:", rpcData.error_message);
    }
    alert(L === 'ar' ? '⚠️ تعذر الاتصال ببوابة الدفع الإلكتروني حالياً. سيتم توجيهك إلى واتساب لإتمام الدفع مباشرة مع الدعم الفني.' : (L === 'fr' ? '⚠️ Impossible de contacter la passerelle de paiement. Redirection vers WhatsApp...' : '⚠️ Could not reach payment gateway. Redirecting to WhatsApp...'));
  }

  var msg = buildMessage(rpcData);
  var waUrl = 'https://wa.me/'+(CONFIG.whatsapp||'213562961410')+'?text='+encodeURIComponent(msg);

  copyToClipboard(msg);
  window.open(waUrl, '_blank');
  showToast(tx.toastTitle, tx.toastDesc);
}

function copyToClipboard(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).catch(function(){});
  } else {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch(e){}
    document.body.removeChild(ta);
  }
}

    email: ($('C_EMAIL').value || '').trim().toLowerCase(),
    phone: ($('C_PHONE').value || '').trim(),
    wilaya: ($('C_WILAYA').value || '').trim(),
    marketing_email_opt_in: $('C_M_EMAIL').checked,
    marketing_whatsapp_opt_in: $('C_M_WA').checked,
    consent_source: 'checkout',
    lang: L
  };
  var err = $('CUSTOMER_ERR');
  if(!info.first_name || !info.last_name || !/^\S+@\S+\.\S+$/.test(info.email) || info.phone.length < 8 || !info.wilaya){
