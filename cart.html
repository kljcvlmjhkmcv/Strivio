<!DOCTYPE html>
<html lang="en" dir="ltr" id="HR" class="scroll-smooth">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Strivio — Cart & Checkout</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="overflow-x-hidden" style="background:#121212">

<main class="max-w-4xl mx-auto p-6 pt-24">
  <div id="cart-container" class="glass-card p-6 rounded-3xl">
    <h1 class="text-2xl font-bold text-white mb-6">Your Cart</h1>
    <div id="cart-items"></div>
    
    <div class="mt-8 border-t border-brand-border pt-6">
      <button id="confirm-btn" onclick="confirmOrder()" class="MCO w-full py-4 text-lg">
        Complete Order Securely
      </button>
    </div>
  </div>
</main>

<script src="supabase-client.js"></script>
<script>
async function confirmOrder() {
  const btn = document.getElementById('confirm-btn');
  const cart = JSON.parse(localStorage.getItem('strivio_cart') || '[]');
  
  if (cart.length === 0) {
    alert("Cart is empty!");
    return;
  }

  btn.disabled = true;
  btn.textContent = "Processing...";

  // إعداد بيانات الطلب (نرسل فقط المعرفات والكميات)
  const orderData = {
    items: cart.map(item => ({
      id: item.id,
      durIdx: item.durIdx,
      typeIdx: item.typeIdx,
      qty: item.qty
    })),
    payment_method: 'cib', // أو حسب اختيار المستخدم
    customer_info: { lang: L }
  };

  // الاتصال بالسيرفر
  const rpcData = await saveOrderToDB(orderData);

  // التحقق الصارم: لا نلمس السلة إلا إذا نجح السيرفر
  if (rpcData && rpcData.success === true) {
    localStorage.removeItem('strivio_cart');
    alert("Order successful! Redirecting to WhatsApp...");
    window.location.href = 'https://wa.me/213562961410'; 
  } else {
    alert("Order failed. Please try again.");
    btn.disabled = false;
    btn.textContent = "Complete Order Securely";
  }
}
</script>
</body>
</html>
